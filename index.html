<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bugly 智能质量评分 · Demo</title>
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--bg4:#21262d;
  --border:#30363d;--border2:#3d4450;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --blue:#58a6ff;--red:#f85149;--orange:#d29922;
  --green:#3fb950;--purple:#bc8cff;--teal:#39d353;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;}

/* Header */
.hdr{height:54px;background:rgba(13,17,23,.95);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.hdr-logo{width:32px;height:32px;background:linear-gradient(135deg,#1f6feb,#388bfd);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:16px;}
.hdr-title{font-size:16px;font-weight:600;}
.hdr-sep{width:1px;height:16px;background:var(--border);}
.hdr-app{font-size:13px;color:var(--text2);}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.pill{font-size:12px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);padding:4px 12px;border-radius:20px;}
.btn{font-size:12px;color:var(--blue);background:rgba(56,139,253,.1);border:1px solid rgba(56,139,253,.3);padding:4px 12px;border-radius:20px;cursor:pointer;}
.btn:hover{background:rgba(56,139,253,.2);}
.ts{font-size:11px;color:var(--text3);}

/* Container */
.wrap{max-width:1280px;margin:0 auto;padding:20px 28px 40px;}

/* Section title */
.sec{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.sec-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);}

/* ─ Score Hero ─ */
.hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:24px 28px;margin-bottom:20px;display:grid;grid-template-columns:200px 1fr auto;gap:28px;align-items:center;}

/* 圆形仪表盘 */
.gauge-wrap{position:relative;width:180px;height:180px;flex-shrink:0;}
#gaugeCanvas{display:block;}
.gauge-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.gauge-num{font-size:44px;font-weight:800;line-height:1;letter-spacing:-2px;}
.gauge-denom{font-size:13px;color:var(--text2);margin-top:1px;}
.gauge-lv{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:6px;}

/* Summary */
.hero-sum{}
.hero-main{font-size:18px;font-weight:700;margin-bottom:8px;}
.hero-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{font-size:12px;padding:3px 9px;border-radius:20px;font-weight:500;}
.chip-r{background:rgba(248,81,73,.1);color:#f85149;border:1px solid rgba(248,81,73,.25);}
.chip-y{background:rgba(210,153,34,.1);color:#e3b341;border:1px solid rgba(210,153,34,.25);}
.chip-g{background:rgba(63,185,80,.1);color:#3fb950;border:1px solid rgba(63,185,80,.25);}
.chip-b{background:rgba(88,166,255,.1);color:#58a6ff;border:1px solid rgba(88,166,255,.25);}

/* Meta */
.hero-meta{display:flex;flex-direction:column;gap:8px;}
.mc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;min-width:130px;position:relative;overflow:hidden;}
.mc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;border-radius:1px;}
.mc.cr::before{background:#f85149;}.mc.an::before{background:#d29922;}.mc.dv::before{background:#58a6ff;}
.mc-lbl{font-size:11px;color:var(--text2);margin-bottom:3px;}
.mc-val{font-size:20px;font-weight:700;line-height:1;}
.mc-chg{font-size:11px;margin-top:3px;}
.bdg{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:1px 5px;border-radius:3px;}
.bdg-up{background:rgba(248,81,73,.1);color:#f85149;}
.bdg-dn{background:rgba(63,185,80,.1);color:#3fb950;}
.bdg-fl{background:rgba(139,148,158,.1);color:#8b949e;}

/* ─ 修复项（重点模块） ─ */
.fix-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;}
.fix-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.fix-header h3{font-size:14px;font-weight:600;}
.fix-header .cnt{font-size:12px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);padding:1px 8px;border-radius:20px;}
/* 大类 */
.fix-group{}
.fix-group-hdr{padding:11px 18px;background:rgba(28,35,51,.6);border-bottom:1px solid rgba(48,54,61,.5);display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.fix-group-hdr:hover{background:rgba(28,35,51,.9);}
.fix-group-icon{font-size:15px;}
.fix-group-name{font-size:13px;font-weight:600;flex:1;}
.fix-group-meta{display:flex;align-items:center;gap:8px;}
.fix-group-cnt{font-size:11px;color:var(--text2);background:var(--bg4);padding:1px 7px;border-radius:10px;}
.fix-group-score{font-size:12px;font-weight:700;}
.fix-group-arrow{font-size:11px;color:var(--text3);transition:.15s;}
.fix-group-arrow.open{transform:rotate(90deg);}
/* 子项 */
.fix-items{display:none;}
.fix-items.open{display:block;}
.fix-item{padding:10px 18px 10px 48px;border-bottom:1px solid rgba(48,54,61,.3);display:flex;align-items:flex-start;gap:10px;}
.fix-item:last-child{border-bottom:none;}
.fix-item:hover{background:rgba(255,255,255,.02);}
.fi-prio{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;flex-shrink:0;margin-top:1px;}
.pi-urg{background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3);}
.pi-hi{background:rgba(210,153,34,.15);color:#e3b341;border:1px solid rgba(210,153,34,.3);}
.pi-med{background:rgba(88,166,255,.15);color:#58a6ff;border:1px solid rgba(88,166,255,.3);}
.fi-body{flex:1;min-width:0;}
.fi-title{font-size:13px;font-weight:500;margin-bottom:2px;}
.fi-desc{font-size:12px;color:var(--text2);line-height:1.5;}
.fi-gain{font-size:12px;font-weight:700;color:#3fb950;white-space:nowrap;flex-shrink:0;padding-top:1px;}

/* ─ Two cols ─ */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:20px;}

/* Dim cards */
.dim{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.dim-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.dim-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.dim-score{font-size:28px;font-weight:800;line-height:1;}
.dim-denom{font-size:12px;color:var(--text3);}
.dim-name{font-size:13px;font-weight:600;margin-bottom:1px;}
.dim-sub{font-size:11px;color:var(--text3);}
.dim-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.dim-bar-f{height:100%;border-radius:2px;}
.sub-rows{display:flex;flex-direction:column;gap:6px;}
.sub-row{display:flex;align-items:center;gap:6px;font-size:12px;}
.sub-nm{color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sub-bw{width:52px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;flex-shrink:0;}
.sub-bf{height:100%;border-radius:2px;}
.sub-pt{font-size:12px;font-weight:700;min-width:30px;text-align:right;}
.dim-pending{margin-top:8px;font-size:11px;color:var(--text3);padding:6px 8px;background:rgba(20,184,166,.06);border:1px dashed rgba(20,184,166,.2);border-radius:6px;text-align:center;}

/* ─ Health gauges ─ */
.health-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.health-card h4{font-size:13px;font-weight:600;margin-bottom:12px;}
.h-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(48,54,61,.4);}
.h-row:last-child{border-bottom:none;}
.h-lbl{width:80px;font-size:12px;color:var(--text2);flex-shrink:0;}
.h-bar{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.h-fill{height:100%;border-radius:2px;}
.h-val{width:42px;text-align:right;font-size:12px;font-weight:700;}
.h-ic{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}

/* ─ Trend ─ */
.trend-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.trend-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.trend-hdr h4{font-size:13px;font-weight:600;}
.trend-tabs{display:flex;gap:0;background:var(--bg3);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.trend-tab{font-size:11px;padding:4px 10px;color:var(--text2);cursor:pointer;transition:.12s;white-space:nowrap;}
.trend-tab:hover{color:var(--text);}
.trend-tab.act{background:var(--blue);color:#fff;}
.trend-legend{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text2);}
.leg-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;}

/* ─ Issues ─ */
.issues-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;}
.issues-hdr{padding:14px 18px 0;border-bottom:1px solid var(--border);}
.issues-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.issues-hdr-top h3{font-size:14px;font-weight:600;}
.itabs{display:flex;}
.itab{padding:7px 14px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:.12s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.itab:hover{color:var(--text);}
.itab.act{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;}
.itab .tc{font-size:11px;background:var(--bg3);padding:1px 5px;border-radius:10px;}
.itab.act .tc{background:rgba(88,166,255,.15);color:var(--blue);}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:rgba(22,27,34,.8);}
th{padding:9px 14px;text-align:left;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
td{padding:10px 14px;border-bottom:1px solid rgba(48,54,61,.4);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(255,255,255,.02);}
.rk{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.rk1{background:linear-gradient(135deg,#b45309,#d97706);color:#fff;}
.rk2{background:linear-gradient(135deg,#374151,#4b5563);color:#d1d5db;}
.rk3{background:linear-gradient(135deg,#7c2d12,#b45309);color:#fed7aa;}
.rkn{background:var(--bg3);color:var(--text3);}
.iid{font-family:monospace;font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 5px;border-radius:3px;}
.inm{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.isig{font-size:11px;color:var(--text3);margin-top:2px;}
.sp{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:20px;border-radius:4px;font-size:11px;font-weight:700;padding:0 5px;}
.sp9{background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3);}
.sp7{background:rgba(210,153,34,.15);color:#e3b341;border:1px solid rgba(210,153,34,.3);}
.sp5{background:rgba(88,166,255,.15);color:#58a6ff;border:1px solid rgba(88,166,255,.3);}
.sp3{background:rgba(100,116,139,.1);color:#8b949e;border:1px solid rgba(100,116,139,.15);}
.dv{font-weight:600;}.dvl{color:#f85149;}.dvm{color:#e3b341;}
.tags{display:flex;flex-wrap:wrap;gap:3px;}
.tg{font-size:11px;padding:1px 6px;border-radius:10px;font-weight:500;}
.tg-crit{background:rgba(248,81,73,.1);color:#f85149;border:1px solid rgba(248,81,73,.2);}
.tg-hi{background:rgba(210,153,34,.1);color:#e3b341;border:1px solid rgba(210,153,34,.2);}
.tg-core{background:rgba(188,140,255,.1);color:#bc8cff;border:1px solid rgba(188,140,255,.2);}
.tg-new{background:rgba(57,211,83,.1);color:#3fb950;border:1px solid rgba(57,211,83,.2);}
.tg-med{background:rgba(139,148,158,.1);color:#8b949e;border:1px solid rgba(139,148,158,.15);}
.sdot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;}
.so{background:#f85149;box-shadow:0 0 4px #f85149;}
.sp_{background:#d29922;box-shadow:0 0 4px #d29922;}
.sd{background:#3fb950;box-shadow:0 0 4px #3fb950;}
.stxt{font-size:12px;display:flex;align-items:center;}

/* ─ Sentiment ─ */
.sent-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.sent-hdr{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;}
.sent-body{padding:14px 16px;}
.sent-store{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(48,54,61,.4);}
.sent-store:last-of-type{border-bottom:none;}
.sent-plat{font-size:13px;font-weight:500;}
.sent-right{display:flex;align-items:center;gap:8px;}
.sent-rt{font-size:14px;font-weight:700;}
.sent-cnt{font-size:11px;color:var(--text3);}
.sent-sample{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5;}

/* Footer */
.foot{text-align:center;padding:16px;color:var(--text3);font-size:11px;border-top:1px solid var(--border);}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
@keyframes spin{to{transform:rotate(360deg);}}.spin{animation:spin .7s linear infinite;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">B</div>
  <div class="hdr-title">智能质量评分</div>
  <div class="hdr-sep"></div>
  <div class="hdr-app">泛互电商 App · 示例</div>
  <div class="hdr-r">
    <div class="pill">📅 最近 7 天</div>
    <div class="btn" onclick="refresh(this)"><span id="ri">🔄</span> 刷新</div>
    <div class="ts" id="ts">—</div>
  </div>
</div>

<div class="wrap">

<!-- Hero -->
<div class="hero">
  <div class="gauge-wrap">
    <canvas id="gaugeCanvas" width="180" height="180"></canvas>
    <div class="gauge-center">
      <div class="gauge-num" id="gNum" style="color:#d29922">0</div>
      <div class="gauge-denom">/ 100</div>
      <div class="gauge-lv" id="gLv">—</div>
    </div>
  </div>
  <div class="hero-sum">
    <div class="hero-main" id="hTitle">正在评分...</div>
    <div class="hero-desc" id="hDesc">—</div>
    <div class="chips" id="hChips"></div>
  </div>
  <div class="hero-meta">
    <div class="mc cr">
      <div class="mc-lbl">设备崩溃率</div>
      <div class="mc-val" id="mCr" style="color:#f85149">—</div>
      <div class="mc-chg" id="mCrC">—</div>
    </div>
    <div class="mc an">
      <div class="mc-lbl">ANR 率</div>
      <div class="mc-val" id="mAn" style="color:#e3b341">—</div>
      <div class="mc-chg" id="mAnC">—</div>
    </div>
    <div class="mc dv">
      <div class="mc-lbl">联网设备</div>
      <div class="mc-val" id="mDv" style="color:#58a6ff">—</div>
      <div class="mc-chg" id="mDvC">—</div>
    </div>
  </div>
</div>

<!-- ===== 修复项（重点） ===== -->
<div class="sec"><span class="sec-dot"></span>待修复项 <span id="fixTotal" style="color:var(--text3);font-size:11px;font-weight:400;letter-spacing:0;text-transform:none;">—</span></div>
<div class="fix-card" id="fixCard"></div>

<!-- 评分维度 -->
<div class="sec" style="margin-top:20px;"><span class="sec-dot"></span>评分维度</div>
<div class="row3" id="dimGrid"></div>

<!-- 指标健康度 + 趋势 -->
<div class="sec"><span class="sec-dot"></span>指标健康度 & 趋势</div>
<div class="row2" style="margin-bottom:20px;">
  <div class="health-card">
    <h4>关键指标</h4>
    <div id="healthRows"></div>
  </div>
  <div class="trend-card">
    <div class="trend-hdr">
      <h4>7 天趋势</h4>
      <div class="trend-tabs" id="trendTabs">
        <div class="trend-tab act" data-k="crash" onclick="switchTrend(this,'crash')">崩溃率</div>
        <div class="trend-tab" data-k="anr" onclick="switchTrend(this,'anr')">ANR 率</div>
        <div class="trend-tab" data-k="foom" onclick="switchTrend(this,'foom')">FOOM 率</div>
        <div class="trend-tab" data-k="jank" onclick="switchTrend(this,'jank')">卡顿率</div>
      </div>
    </div>
    <canvas id="trendCanvas" height="120"></canvas>
  </div>
</div>

<!-- Top 异常 -->
<div class="sec"><span class="sec-dot"></span>Top 异常问题</div>
<div class="issues-card">
  <div class="issues-hdr">
    <div class="issues-hdr-top">
      <h3>问题排行</h3>
      <span class="pill" id="iCntBdg">共 — 条</span>
    </div>
    <div class="itabs" id="itabs">
      <div class="itab act" data-t="crash" onclick="switchTab(this,'crash')">💥 崩溃 <span class="tc" id="tc-crash">—</span></div>
      <div class="itab" data-t="anr" onclick="switchTab(this,'anr')">⏳ ANR <span class="tc" id="tc-anr">—</span></div>
      <div class="itab" data-t="oom" onclick="switchTab(this,'oom')">💾 OOM/FOOM <span class="tc" id="tc-oom">—</span></div>
      <div class="itab" data-t="jank" onclick="switchTab(this,'jank')">🐢 卡顿 <span class="tc" id="tc-jank">—</span></div>
    </div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>排名</th><th>问题 ID</th><th>描述</th><th>影响设备</th>
        <th>严重度</th><th>标签</th><th>状态</th>
      </tr></thead>
      <tbody id="iTbody"></tbody>
    </table>
  </div>
</div>

<!-- 舆情 -->
<div class="sec"><span class="sec-dot"></span>质量舆情</div>
<div class="row2" style="margin-bottom:20px;">
  <div class="sent-card">
    <div class="sent-hdr">应用商店评分</div>
    <div class="sent-body" id="sentStores"></div>
  </div>
  <div class="sent-card">
    <div class="sent-hdr">用户反馈热词</div>
    <div class="sent-body" id="sentWords" style="padding:14px 16px;"></div>
  </div>
</div>

</div><!-- /wrap -->
<div class="foot">Bugly 智能质量评分 Demo · 数据为虚构演示</div>

<script>
// ═══ 数据 ═══
const D = {
  crashRate:0.312, crashRatePrev:0.278,
  anrRate:0.187,   anrRatePrev:0.201,
  foomRate:0.042,  foomRatePrev:0.038,
  jankRate:1.87,   jankRatePrev:2.14,
  devices:2373000, devicesPrev:2318000,
  trend:{
    crash:[0.41,0.38,0.35,0.44,0.29,0.31,0.31],
    anr:  [0.24,0.22,0.20,0.28,0.18,0.19,0.19],
    foom: [0.05,0.04,0.04,0.06,0.03,0.04,0.04],
    jank: [2.21,2.10,1.95,2.38,1.71,1.80,1.87],
  },

// ═══ 评分 ═══
function decay(i){return 1/Math.log(i+2);}
function sigLvl(sig){
  if(["SIGSEGV","SIGABRT","SIGTRAP"].includes(sig))return{l:"Critical",s:2};
  if(["OOM","ANR","FOOM"].includes(sig))return{l:"High",s:1};
  return{l:"Medium",s:0};
}
function scoreIssue(is,i){
  const dA=is.dv>=10000?4:is.dv>=5000?3:is.dv>=1000?2:is.dv>=200?1:.5;
  const dB=(is.sig==="SIGSEGV"||is.sig==="SIGABRT")?2:(is.sig==="ANR"||is.sig==="OOM"||is.sig==="FOOM")?1.5:is.sig==="JANK"?1:1.5;
  const sl=sigLvl(is.sig);
  let dC=sl.s;
  if(is.core)dC+=1.5; if(is.nw)dC+=.5;
  dC=Math.min(4,dC);
  const total=Math.min(10,dA+dB+dC);
  return{...is,total,sigLvl:sl.l,w:total*decay(i)};
}

function calc(){
  const cr=D.stability.cr, ar=D.stability.ar;
  const s11=cr<=.1?16:cr<=.2?14:cr<=.3?11:cr<=.5?7:cr<=1?3:0;
  const s12=ar<=.05?12:ar<=.1?10:ar<=.2?7:ar<=.4?3:0;
  const s13=D.stability.burst?0:8;
  const s14=D.stability.trend==="down"?4:D.stability.trend==="flat"?2:0;
  const stab=s11+s12+s13+s14;

  const list=ISSUES.crash.slice(0,20).map((is,i)=>scoreIssue(is,i));
  const W=list.reduce((s,x)=>s+x.w,0);
  const Wmax=Array.from({length:20},(_,i)=>10*decay(i)).reduce((a,b)=>a+b,0);
  const sev=Math.min(30,Math.max(0,Math.round(30*(1-W/Wmax))+Math.min(5,list.filter(x=>x.total>=7&&x.st!=="open").length)));

  const ft=D.ops.feat;
  const resp=D.ops.top10>=10?10:D.ops.top10>=8?8:D.ops.top10>=6?5:D.ops.top10>=4?3:0;
  const feat=Math.round(Math.min(8,(ft.symbol?2:0)+(ft.anr?2:0)+(ft.oom?1.5:0)+(ft.log?1:0)+(ft.alert?1:0)+(ft.ver?.5:0)));
  const logS=!D.ops.logSdk?0:D.ops.logRatio>=.6?2:D.ops.logRatio>=.3?1:0;
  const ops=resp+feat+logS;

  const sent=6; // demo值
  const total=stab+sev+ops;
  return{total,stab,sev,ops,sent,sub:{stab:{s11,s12,s13,s14},ops:{resp,feat,log:logS}},list};
}
const SC=calc();

function scColor(s,m){const p=s/m;return p>=.8?"#3fb950":p>=.6?"#58a6ff":p>=.4?"#d29922":"#f85149";}
function totColor(s){return s>=80?"#3fb950":s>=65?"#58a6ff":s>=45?"#d29922":"#f85149";}
function lvInfo(s){
  if(s>=80)return{t:"优秀",c:"#3fb950",bg:"rgba(63,185,80,.15)"};
  if(s>=65)return{t:"良好",c:"#58a6ff",bg:"rgba(88,166,255,.15)"};
  if(s>=45)return{t:"待改进",c:"#d29922",bg:"rgba(210,153,34,.15)"};
  return{t:"较差",c:"#f85149",bg:"rgba(248,81,73,.15)"};
}
function fmtDv(n){return n>=10000?(n/10000).toFixed(1)+"w":n.toLocaleString();}

// ═══ 圆形仪表盘 ═══
function drawGauge(val){
  const cv=document.getElementById("gaugeCanvas");
  const dpr=window.devicePixelRatio||1;
  cv.width=180*dpr; cv.height=180*dpr;
  cv.style.width="180px"; cv.style.height="180px";
  const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,180,180);
  const cx=90,cy=95,R=72,sw=12;
  const start=Math.PI*.75, end=Math.PI*2.25;
  const total_arc=end-start;

  // 背景弧
  ctx.beginPath(); ctx.arc(cx,cy,R,start,end);
  ctx.strokeStyle="rgba(48,54,61,.8)"; ctx.lineWidth=sw; ctx.lineCap="round"; ctx.stroke();

  // 颜色分段
  const segs=[
    {from:0,to:.45,c:"#f85149"},{from:.45,to:.65,c:"#d29922"},
    {from:.65,to:.8,c:"#58a6ff"},{from:.8,to:1,c:"#3fb950"}
  ];
  segs.forEach(seg=>{
    ctx.beginPath();
    ctx.arc(cx,cy,R,start+seg.from*total_arc,start+seg.to*total_arc);
    ctx.strokeStyle=seg.c+"44"; ctx.lineWidth=sw; ctx.lineCap="butt"; ctx.stroke();
  });

  // 当前值弧
  const pct=Math.min(val/100,1);
  if(pct>0){
    const segColor=val>=80?"#3fb950":val>=65?"#58a6ff":val>=45?"#d29922":"#f85149";
    const grad=ctx.createLinearGradient(cx-R,cy,cx+R,cy);
    grad.addColorStop(0,segColor+"99"); grad.addColorStop(1,segColor);
    ctx.beginPath(); ctx.arc(cx,cy,R,start,start+pct*total_arc);
    ctx.strokeStyle=grad; ctx.lineWidth=sw; ctx.lineCap="round"; ctx.stroke();
    // 末端亮点
    const angle=start+pct*total_arc;
    const ex=cx+R*Math.cos(angle), ey=cy+R*Math.sin(angle);
    ctx.beginPath(); ctx.arc(ex,ey,sw/2+1,0,Math.PI*2);
    ctx.fillStyle=segColor; ctx.fill();
    ctx.beginPath(); ctx.arc(ex,ey,4,0,Math.PI*2);
    ctx.fillStyle="#fff"; ctx.fill();
  }

  // 刻度
  for(let i=0;i<=10;i++){
    const a=start+(i/10)*total_arc;
    const r1=R-sw/2-2, r2=R+sw/2+2;
    const cos=Math.cos(a), sin=Math.sin(a);
    ctx.beginPath(); ctx.moveTo(cx+r1*cos,cy+r1*sin); ctx.lineTo(cx+r2*cos,cy+r2*sin);
    ctx.strokeStyle=i%5===0?"rgba(139,148,158,.5)":"rgba(48,54,61,.8)";
    ctx.lineWidth=i%5===0?1.5:1; ctx.stroke();
  }

  // 刻度标签
  [0,50,100].forEach((v,idx)=>{
    const a=start+(idx*0.5)*total_arc;
    const lr=R+22;
    ctx.fillStyle="rgba(139,148,158,.7)"; ctx.font=`10px sans-serif`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(v,cx+lr*Math.cos(a),cy+lr*Math.sin(a));
  });
}

function renderHero(){
  const lv=lvInfo(SC.total);
  const numEl=document.getElementById("gNum");
  numEl.style.color=totColor(SC.total);
  const lvEl=document.getElementById("gLv");
  lvEl.textContent=lv.t; lvEl.style.color=lv.c; lvEl.style.background=lv.bg;

  let cur=0;
  const step=Math.max(1,Math.ceil(SC.total/45));
  const tmr=setInterval(()=>{
    cur=Math.min(cur+step,SC.total);
    numEl.textContent=cur; drawGauge(cur);
    if(cur>=SC.total){clearInterval(tmr);drawGauge(SC.total);}
  },22);

  const descMap={

    "待改进":"质量存在明显问题，崩溃率偏高或有重大未处理问题，建议优先修复高严重度问题。",
    "较差":"质量较差，多项指标超出行业基准，建议立即启动质量专项治理。"
  };
  document.getElementById("hTitle").textContent=`质量评级：${lv.t}（${SC.total} 分）`;

  const chips=[];

  const crit=SC.list.filter(x=>x.total>=8&&x.st==="open").length;

  if(!chips.length) chips.push(`<span class="chip chip-g">✅ 无紧急风险</span>`);
  document.getElementById("hChips").innerHTML=chips.join("");

  document.getElementById("mCr").textContent=D.crashRate.toFixed(3)+"%";
  document.getElementById("mAn").textContent=D.anrRate.toFixed(3)+"%";
  document.getElementById("mDv").textContent=(D.devices/10000).toFixed(1)+"w";
  const crD=((D.crashRate-D.crashRatePrev)/D.crashRatePrev*100).toFixed(1);
  document.getElementById("mCrC").innerHTML=`<span class="bdg ${+crD>0?"bdg-up":"bdg-dn"}">${+crD>0?"▲":"▼"}${Math.abs(crD)}%</span> <span style="color:var(--text3)">较上周</span>`;
  document.getElementById("mAnC").innerHTML=`<span class="bdg bdg-dn">▼3.7%</span> <span style="color:var(--text3)">较上周</span>`;
  document.getElementById("mDvC").innerHTML=`<span class="bdg bdg-fl">+2.4%</span> <span style="color:var(--text3)">较上周</span>`;
}

function renderHealth(){
  const rows=[
    {l:"设备崩溃率",v:D.crashRate,good:.1,bad:1,unit:"%",inv:true},
    {l:"ANR 率",    v:D.anrRate,  good:.05,bad:.4,unit:"%",inv:true},
    {l:"FOOM 率",   v:D.foomRate, good:.02,bad:.2,unit:"%",inv:true},
    {l:"Top10响应率",v:D.ops.top10/10,good:1,bad:.4,pct:true,inv:false},
    {l:"日志关联率",v:D.ops.logRatio,good:.6,bad:.2,pct:true,inv:false},
    {l:"功能开启度",v:Object.values(D.ops.feat).filter(Boolean).length/Object.values(D.ops.feat).length,good:1,bad:.5,pct:true,inv:false},
  ];
  document.getElementById("healthRows").innerHTML=rows.map(g=>{
    const h=g.inv?Math.max(0,Math.min(1,1-(g.v-g.good)/(g.bad-g.good))):Math.max(0,Math.min(1,(g.v-g.bad)/(g.good-g.bad)));
    const c=h>=.7?"#3fb950":h>=.4?"#d29922":"#f85149";
    const vs=g.pct?(g.v*100).toFixed(0)+"%":g.v.toFixed(3)+(g.unit||"");
    const ic=h>=.7?"✓":h>=.4?"!":"✕";
    return `<div class="h-row">
      <div class="h-lbl">${g.l}</div>
      <div class="h-bar"><div class="h-fill" style="width:${(h*100).toFixed(0)}%;background:${c};"></div></div>
      <div class="h-val" style="color:${c}">${vs}</div>
      <div class="h-ic" style="background:${c}22;color:${c}">${ic}</div>
    </div>`;
  }).join("");
}

// ═══ 趋势 ═══
let curTrend="crash";
function switchTrend(el,k){
  document.querySelectorAll(".trend-tab").forEach(t=>t.classList.remove("act"));
  el.classList.add("act");
  curTrend=k; drawTrend(k);
}

const TREND_CFG={
  crash:{label:"崩溃率 (%)",color:"#f85149",fill:"rgba(248,81,73,.12)"},
  anr:  {label:"ANR 率 (%)", color:"#d29922",fill:"rgba(210,153,34,.10)"},
  foom: {label:"FOOM 率 (%)",color:"#bc8cff",fill:"rgba(188,140,255,.10)"},
  jank: {label:"卡顿率 (%)", color:"#58a6ff",fill:"rgba(88,166,255,.10)"},
};

function drawTrend(key="crash"){
  const cv=document.getElementById("trendCanvas");
  const W=cv.parentElement.clientWidth||360, H=120;
  const dpr=window.devicePixelRatio||1;
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+"px"; cv.style.height=H+"px";
  const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const data=D.trend[key];
  const cfg=TREND_CFG[key];
  const PAD={t:14,b:22,l:10,r:10};
  const cW=W-PAD.l-PAD.r, cH=H-PAD.t-PAD.b;
  const max=Math.max(...data)*1.3;
  const days=["3/24","3/25","3/26","3/27","3/28","3/29","3/30"];

  const pts=data.map((v,i)=>({
    x:PAD.l+(i/(data.length-1))*cW,
    y:PAD.t+cH*(1-v/max)
  }));

  // Fill
  const grad=ctx.createLinearGradient(0,PAD.t,0,H-PAD.b);
  grad.addColorStop(0,cfg.fill.replace("0.","0.4").replace(".12",".3").replace(".10",".25"));
  grad.addColorStop(1,"transparent");
  ctx.beginPath();
  ctx.moveTo(pts[0].x,H-PAD.b);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H-PAD.b);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();

  // Line (smooth)
  ctx.beginPath();
  pts.forEach((p,i)=>{
    if(i===0){ctx.moveTo(p.x,p.y);return;}
    const pp=pts[i-1];
    const cpx=(pp.x+p.x)/2;
    ctx.bezierCurveTo(cpx,pp.y,cpx,p.y,p.x,p.y);
  });
  ctx.strokeStyle=cfg.color; ctx.lineWidth=2; ctx.stroke();

  // Dots & values
  pts.forEach((p,i)=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2);
    ctx.fillStyle=cfg.color; ctx.fill();
    ctx.fillStyle="rgba(230,237,243,.8)"; ctx.font=`9px sans-serif`; ctx.textAlign="center";
    ctx.fillText(data[i].toFixed(2)+"%",p.x,p.y-8);
  });

  // X labels
  ctx.fillStyle="rgba(139,148,158,.6)"; ctx.font=`9px sans-serif`; ctx.textAlign="center";
  days.forEach((d,i)=>{
    const x=PAD.l+(i/(days.length-1))*cW;
    ctx.fillText(d,x,H-4);
  });
}

// ═══ 问题表格 ═══
const tabCnts={crash:ISSUES.crash.length,anr:ISSUES.anr.length,oom:ISSUES.oom.length,jank:ISSUES.jank.length};

function switchTab(el,t){
  document.querySelectorAll(".itab").forEach(x=>x.classList.remove("act"));
  el.classList.add("act");
  renderIssues(t);
}

function renderIssues(t){
  const list=ISSUES[t]||[];
  document.getElementById("iCntBdg").textContent=`共 ${list.length} 条`;
  const scored=list.map((is,i)=>scoreIssue(is,i));
  document.getElementById("iTbody").innerHTML=scored.map((is,i)=>{
    const rkC=i===0?"rk1":i===1?"rk2":i===2?"rk3":"rkn";
    const sv=is.total;
    const svC=sv>=9?"sp9":sv>=7?"sp7":sv>=5?"sp5":"sp3";
    const dvC=is.dv>=10000?"dvl":is.dv>=3000?"dvm":"";
    const sdC=is.st==="open"?"so":is.st==="processing"?"sp_":"sd";
    const stTxt=is.st==="open"?"待处理":is.st==="processing"?"处理中":"已处理";
    const sl=sigLvl(is.sig);
    const tags=[];
    if(sl.l==="Critical") tags.push(`<span class="tg tg-crit">⚡ Critical</span>`);
    else if(sl.l==="High") tags.push(`<span class="tg tg-hi">🔶 High</span>`);
    else tags.push(`<span class="tg tg-med">Medium</span>`);
    if(is.core) tags.push(`<span class="tg tg-core">🎯 核心</span>`);
    if(is.nw)   tags.push(`<span class="tg tg-new">🆕 新增</span>`);
    return `<tr>
      <td><span class="rk ${rkC}">${i+1}</span></td>
      <td><span class="iid">${is.id}</span></td>
      <td><div class="inm" title="${is.name}">${is.name}</div><div class="isig">${is.sig}</div></td>
      <td><span class="dv ${dvC}">${fmtDv(is.dv)}</span></td>
      <td><span class="sp ${svC}">${sv.toFixed(1)}</span></td>
      <td><div class="tags">${tags.join("")}</div></td>
      <td><div class="stxt"><span class="sdot ${sdC}"></span>${stTxt}</div></td>
    </tr>`;
  }).join("");
}

function initTabs(){
  Object.keys(tabCnts).forEach(t=>{
    const el=document.getElementById("tc-"+t);
    if(el) el.textContent=tabCnts[t];
  });
}

// ═══ 舆情 ═══
function renderSentiment(){
  const stores=D.sentiment.stores;
  document.getElementById("sentStores").innerHTML=stores.map(s=>{
    const rc=s.rating>=4?"#3fb950":s.rating>=3?"#d29922":"#f85149";
    return `<div class="sent-store">
      <div>
        <div class="sent-plat">${s.name}</div>
        <div class="sent-sample">「${s.sample}」</div>
      </div>
      <div class="sent-right">
        <div class="sent-rt" style="color:${rc}">${s.rating} ⭐</div>
        <div class="sent-cnt">${s.cnt}条</div>
      </div>
    </div>`;
  }).join("");

  const words=D.sentiment.words;
  document.getElementById("sentWords").innerHTML=`
    <div style="display:flex;flex-wrap:wrap;gap:6px;">
      ${words.map(w=>`
        <span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:20px;
          background:${w.neg?"rgba(248,81,73,.08)":"rgba(63,185,80,.08)"};
          color:${w.neg?"#f85149":"#3fb950"};
          border:1px solid ${w.neg?"rgba(248,81,73,.2)":"rgba(63,185,80,.2)"};">
          ${w.w}<span style="font-size:10px;opacity:.7">${w.cnt}</span>
        </span>`).join("")}
    </div>
    <div style="margin-top:14px;font-size:12px;color:var(--text3);line-height:1.6;">
      综合舆情评分：<span style="font-weight:700;color:#d29922">6 / 10</span> · 用户反馈以稳定性问题为主，建议优先修复崩溃和卡顿
    </div>`;
}
