<!DOCTYPE html>
<!-- v2.0.0 tech-light -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bugly 智能质量评分 · Demo</title>
<style>
:root{
  /* 主色调：科技蓝体系 */
  --primary:#1565c0;
  --primary-light:#1976d2;
  --primary-soft:rgba(21,101,192,.08);
  --primary-border:rgba(21,101,192,.18);

  /* 背景层次 */
  --bg:#f4f6fb;
  --bg2:#ffffff;
  --bg3:#f0f4fa;
  --bg4:#e8edf5;
  --bg-card:#ffffff;

  /* 边框 */
  --border:#dde3ee;
  --border2:#c8d0e0;

  /* 文字 */
  --text:#1a2236;
  --text2:#4a5568;
  --text3:#8899b0;

  /* 语义色（针对浅色背景优化） */
  --red:#d32f2f;
  --red-bg:rgba(211,47,47,.07);
  --red-border:rgba(211,47,47,.2);

  --orange:#e65100;
  --orange-bg:rgba(230,81,0,.07);
  --orange-border:rgba(230,81,0,.18);

  --green:#2e7d32;
  --green-bg:rgba(46,125,50,.07);
  --green-border:rgba(46,125,50,.2);

  --blue:#1565c0;
  --blue-bg:rgba(21,101,192,.07);
  --blue-border:rgba(21,101,192,.18);

  --purple:#6a1b9a;
  --purple-bg:rgba(106,27,154,.07);
  --purple-border:rgba(106,27,154,.18);

  --teal:#00695c;
  --teal-bg:rgba(0,105,92,.07);

  /* 圆角 & 阴影 */
  --r:12px;
  --rs:8px;
  --shadow:0 1px 4px rgba(30,60,120,.06),0 6px 20px rgba(30,60,120,.07);
  --shadow-sm:0 1px 3px rgba(30,60,120,.06);
  --shadow-lg:0 4px 24px rgba(30,60,120,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;}

/* ─ Header ─ */
.hdr{
  height:56px;
  background:rgba(255,255,255,.96);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 28px;gap:14px;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
  box-shadow:0 1px 0 var(--border),0 2px 12px rgba(30,60,120,.05);
}
.hdr-logo{
  width:34px;height:34px;
  background:linear-gradient(135deg,#1565c0 0%,#42a5f5 100%);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#fff;font-size:16px;
  box-shadow:0 2px 8px rgba(21,101,192,.35);
  letter-spacing:-1px;
}
.hdr-title{font-size:15px;font-weight:700;color:var(--text);}
.hdr-sep{width:1px;height:16px;background:var(--border);}
.hdr-app{font-size:13px;color:var(--text2);}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.pill{
  font-size:12px;color:var(--text2);
  background:var(--bg3);border:1px solid var(--border);
  padding:4px 12px;border-radius:20px;
}
.btn{
  font-size:12px;color:var(--primary);
  background:var(--blue-bg);border:1px solid var(--blue-border);
  padding:4px 12px;border-radius:20px;cursor:pointer;transition:.15s;
}
.btn:hover{background:rgba(21,101,192,.13);border-color:rgba(21,101,192,.3);}
.ts{font-size:11px;color:var(--text3);}

/* ─ Container ─ */
.wrap{max-width:1280px;margin:0 auto;padding:22px 28px 48px;}

/* ─ Section label ─ */
.sec{
  font-size:11px;font-weight:700;color:var(--text2);
  letter-spacing:1px;text-transform:uppercase;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.sec-dot{
  width:16px;height:4px;border-radius:2px;
  background:linear-gradient(90deg,var(--primary),#42a5f5);
}

/* ─ Score Hero ─ */
.hero{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:16px;
  padding:28px 32px;
  margin-bottom:22px;
  display:grid;
  grid-template-columns:200px 1fr;
  gap:32px;
  align-items:center;
  box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(21,101,192,.04) 0%,transparent 70%);
  pointer-events:none;
}

/* 圆形仪表盘 */
.gauge-wrap{position:relative;width:180px;height:180px;flex-shrink:0;}
#gaugeCanvas{display:block;}
.gauge-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.gauge-num{font-size:46px;font-weight:900;line-height:1;letter-spacing:-2px;}
.gauge-denom{font-size:12px;color:var(--text3);margin-top:2px;}
.gauge-lv{display:inline-block;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;margin-top:6px;letter-spacing:.3px;}

/* Hero Right */
.hero-main{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text);}
.hero-desc{font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:14px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
.chip-r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.chip-y{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border);}
.chip-g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.chip-b{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);}

/* ─ 修复项 ─ */
.fix-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  margin-bottom:22px;box-shadow:var(--shadow);
}
.fix-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.fix-header h3{font-size:14px;font-weight:600;}
.fix-header .cnt{font-size:12px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);padding:1px 8px;border-radius:20px;}
.fix-group{}
.fix-group-hdr{
  padding:11px 20px;background:var(--bg3);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .12s;
}
.fix-group-hdr:hover{background:var(--bg4);}
.fix-group-icon{font-size:14px;}
.fix-group-name{font-size:13px;font-weight:600;flex:1;}
.fix-group-meta{display:flex;align-items:center;gap:8px;}
.fix-group-cnt{font-size:11px;color:var(--text2);background:var(--bg4);padding:1px 7px;border-radius:10px;border:1px solid var(--border);}
.fix-group-score{font-size:12px;color:var(--text3);}
.fix-group-arrow{font-size:10px;color:var(--text3);transition:.15s;}
.fix-group-arrow.open{transform:rotate(90deg);}
.fix-items{display:none;}
.fix-items.open{display:block;}
.fix-item{padding:10px 20px 10px 52px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;transition:background .1s;}
.fix-item:last-child{border-bottom:none;}
.fix-item:hover{background:var(--bg3);}
.fi-prio{font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px;flex-shrink:0;margin-top:1px;}
.pi-urg{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.pi-hi{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border);}
.pi-med{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);}
.fi-body{flex:1;min-width:0;}
.fi-title{font-size:13px;font-weight:500;margin-bottom:2px;color:var(--text);}
.fi-desc{font-size:12px;color:var(--text2);line-height:1.5;}
.fi-gain{font-size:12px;font-weight:700;color:var(--green);white-space:nowrap;flex-shrink:0;padding-top:1px;}

/* ─ Grid layouts ─ */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:22px;}

/* ─ Dim cards ─ */
.dim{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:18px 20px;
  box-shadow:var(--shadow);
  transition:box-shadow .15s,border-color .15s;
}
.dim:hover{box-shadow:var(--shadow-lg);border-color:var(--border2);}
.dim-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.dim-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.dim-score{font-size:30px;font-weight:900;line-height:1;}
.dim-denom{font-size:12px;color:var(--text3);}
.dim-name{font-size:13px;font-weight:700;margin-bottom:1px;color:var(--text);}
.dim-sub{font-size:11px;color:var(--text3);}
.dim-bar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.dim-bar-f{height:100%;border-radius:3px;transition:width .6s ease;}
.sub-rows{display:flex;flex-direction:column;gap:7px;}
.sub-row{display:flex;align-items:center;gap:6px;font-size:12px;}
.sub-nm{color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sub-bw{width:54px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;flex-shrink:0;}
.sub-bf{height:100%;border-radius:2px;}
.sub-pt{font-size:12px;font-weight:700;min-width:32px;text-align:right;}

/* ─ Health card ─ */
.health-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:18px 20px;
  box-shadow:var(--shadow);
}
.health-card h4{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--text);}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.mc2{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--rs);padding:11px 13px;
  position:relative;overflow:hidden;
  transition:border-color .15s,box-shadow .15s;
}
.mc2:hover{border-color:var(--border2);box-shadow:var(--shadow-sm);}
.mc2-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px;}
.mc2-lbl{font-size:11px;color:var(--text2);line-height:1.3;}
.mc2-val{font-size:19px;font-weight:900;line-height:1;letter-spacing:-.5px;}
.mc2-foot{display:flex;align-items:center;gap:5px;margin-top:5px;}
.mc2-ref{font-size:10px;color:var(--text3);}
.mc2-chg{font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;}
.mc2-chg-up{background:var(--red-bg);color:var(--red);}
.mc2-chg-dn{background:var(--green-bg);color:var(--green);}
.mc2-chg-fl{background:rgba(100,116,139,.08);color:var(--text3);}

/* ─ Trend card ─ */
.trend-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:18px 20px;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow);
}
.trend-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-shrink:0;}
.trend-hdr h4{font-size:13px;font-weight:700;color:var(--text);}
.trend-tabs{
  display:flex;gap:0;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:8px;overflow:hidden;flex-shrink:0;
}
.trend-tab{
  font-size:11px;padding:5px 13px;
  color:var(--text2);cursor:pointer;
  transition:.12s;white-space:nowrap;
  border-right:1px solid var(--border);
  font-weight:500;
}
.trend-tab:last-child{border-right:none;}
.trend-tab:hover{color:var(--text);background:var(--bg4);}
.trend-tab.act{color:#fff;font-weight:700;}
.trend-canvas-wrap{flex:1;position:relative;min-height:150px;margin-top:8px;}

/* ─ Issues ─ */
.issues-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  margin-bottom:22px;box-shadow:var(--shadow);
}
.issues-hdr{padding:16px 20px 0;border-bottom:1px solid var(--border);}
.issues-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.issues-hdr-top h3{font-size:14px;font-weight:700;color:var(--text);}
.itabs{display:flex;}
.itab{
  padding:8px 15px;font-size:13px;color:var(--text2);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:.12s;display:flex;align-items:center;gap:5px;white-space:nowrap;
  font-weight:500;
}
.itab:hover{color:var(--text);}
.itab.act{color:var(--primary);border-bottom-color:var(--primary);font-weight:700;}
.itab .tc{font-size:11px;background:var(--bg3);padding:1px 6px;border-radius:10px;border:1px solid var(--border);transition:.12s;}
.itab.act .tc{background:var(--blue-bg);color:var(--primary);border-color:var(--blue-border);}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--bg3);}
th{
  padding:10px 15px;text-align:left;
  font-size:11px;color:var(--text3);
  font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  white-space:nowrap;border-bottom:1px solid var(--border);
}
td{padding:11px 15px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--bg3);}
.rk{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.rk1{background:linear-gradient(135deg,#b45309,#f59e0b);color:#fff;box-shadow:0 2px 5px rgba(180,83,9,.3);}
.rk2{background:linear-gradient(135deg,#475569,#94a3b8);color:#fff;}
.rk3{background:linear-gradient(135deg,#92400e,#d97706);color:#fff;}
.rkn{background:var(--bg4);color:var(--text3);border:1px solid var(--border);}
.iid{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 6px;border-radius:4px;border:1px solid var(--border);}
.inm{max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.isig{font-size:11px;color:var(--text3);margin-top:2px;}
.sp{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:21px;border-radius:5px;font-size:11px;font-weight:700;padding:0 6px;}
.sp9{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.sp7{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border);}
.sp5{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);}
.sp3{background:var(--bg4);color:var(--text3);border:1px solid var(--border);}
.dv{font-weight:700;}.dvl{color:var(--red);}.dvm{color:var(--orange);}
.tags{display:flex;flex-wrap:wrap;gap:3px;}
.tg{font-size:11px;padding:2px 7px;border-radius:10px;font-weight:600;}
.tg-crit{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.tg-hi{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border);}
.tg-core{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border);}
.tg-new{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.tg-med{background:var(--bg4);color:var(--text3);border:1px solid var(--border);}
.sdot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;}
.so{background:var(--red);}.sp_{background:var(--orange);}.sd{background:var(--green);}
.stxt{font-size:12px;display:flex;align-items:center;}

/* ─ Sentiment ─ */
.sent-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  box-shadow:var(--shadow);
}
.sent-hdr{
  padding:12px 18px;border-bottom:1px solid var(--border);
  font-size:13px;font-weight:700;color:var(--text);
  background:var(--bg3);
  display:flex;align-items:center;justify-content:space-between;
}
.sent-body{padding:14px 18px;}
.sent-store{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.sent-store:last-of-type{border-bottom:none;}
.sent-plat{font-size:13px;font-weight:600;color:var(--text);}
.sent-right{display:flex;align-items:center;gap:8px;}
.sent-rt{font-size:14px;font-weight:700;}
.sent-cnt{font-size:11px;color:var(--text3);}
.sent-sample{font-size:12px;color:var(--text3);margin-top:3px;line-height:1.5;}

/* ─ Badges ─ */
.bdg{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:1px 6px;border-radius:4px;}
.bdg-up{background:var(--red-bg);color:var(--red);}
.bdg-dn{background:var(--green-bg);color:var(--green);}
.bdg-fl{background:rgba(100,116,139,.08);color:var(--text3);}

/* ─ Footer ─ */
.foot{
  text-align:center;padding:18px;color:var(--text3);
  font-size:11px;border-top:1px solid var(--border);
  background:var(--bg2);
}

/* ─ Scrollbar ─ */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg3);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--primary);}

@keyframes spin{to{transform:rotate(360deg);}}
.spin{animation:spin .7s linear infinite;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.wrap > *{animation:fadeIn .3s ease both;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">B</div>
  <div class="hdr-title">智能质量评分</div>
  <div class="hdr-sep"></div>
  <div class="hdr-app">泛互电商 App · 示例</div>
  <div class="hdr-r">
    <div class="pill">📅 最近 7 天</div>
    <div class="btn" onclick="refresh(this)"><span id="ri">🔄</span> 刷新</div>
    <div class="ts" id="ts">—</div>
  </div>
</div>

<div class="wrap">

<!-- Hero -->
<div class="hero">
  <div class="gauge-wrap">
    <canvas id="gaugeCanvas" width="180" height="180"></canvas>
    <div class="gauge-center">
      <div class="gauge-num" id="gNum" style="color:#e65100">0</div>
      <div class="gauge-denom">/ 100</div>
      <div class="gauge-lv" id="gLv">—</div>
    </div>
  </div>
  <div class="hero-sum">
    <div class="hero-main" id="hTitle">正在评分...</div>
    <div class="hero-desc" id="hDesc">—</div>
    <div class="chips" id="hChips"></div>
  </div>
</div>

<!-- 待修复项 -->
<div class="sec"><span class="sec-dot"></span>待修复项 <span id="fixTotal" style="color:var(--text3);font-size:11px;font-weight:400;letter-spacing:0;text-transform:none;">—</span></div>
<div class="fix-card" id="fixCard"></div>

<!-- 评分维度 -->
<div class="sec" style="margin-top:22px;"><span class="sec-dot"></span>评分维度</div>
<div class="row3" id="dimGrid"></div>

<!-- 指标健康度 + 趋势 -->
<div class="sec"><span class="sec-dot"></span>指标健康度 & 趋势（近7天）</div>
<div class="row2" style="margin-bottom:22px;align-items:stretch;">
  <div class="health-card">
    <h4>关键指标</h4>
    <div class="metric-grid" id="healthRows"></div>
  </div>
  <div class="trend-card">
    <div class="trend-hdr">
      <h4>7 天趋势</h4>
      <div class="trend-tabs" id="trendTabs">
        <div class="trend-tab act" style="background:#d32f2f;" onclick="switchTrend(this,'crash')">崩溃率</div>
        <div class="trend-tab" onclick="switchTrend(this,'anr')">ANR率</div>
        <div class="trend-tab" onclick="switchTrend(this,'foom')">FOOM率</div>
      </div>
    </div>
    <div class="trend-canvas-wrap">
      <canvas id="trendCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>
    </div>
  </div>
</div>

<!-- Top 异常 -->
<div class="sec"><span class="sec-dot"></span>Top 异常问题</div>
<div class="issues-card">
  <div class="issues-hdr">
    <div class="issues-hdr-top">
      <h3>问题排行</h3>
      <span class="pill" id="iCntBdg">共 — 条</span>
    </div>
    <div class="itabs" id="itabs">
      <div class="itab act" data-t="crash" onclick="switchTab(this,'crash')">崩溃 <span class="tc" id="tc-crash">—</span></div>

function decay(i){return 1/Math.log(i+2);}
function sigLvl(sig){
  if(["SIGSEGV","SIGABRT","SIGTRAP"].includes(sig))return{l:"Critical",s:2};
  if(["OOM","ANR","FOOM"].includes(sig))return{l:"High",s:1};
  return{l:"Medium",s:0};
}
function scoreIssue(is,i){
  const dA=is.dv>=10000?4:is.dv>=5000?3:is.dv>=1000?2:is.dv>=200?1:.5;
  const dB=(is.sig==="SIGSEGV"||is.sig==="SIGABRT")?2:(is.sig==="ANR"||is.sig==="OOM"||is.sig==="FOOM")?1.5:is.sig==="JANK"?1:1.5;
  const sl=sigLvl(is.sig);
  let dC=sl.s;
  if(is.core)dC+=1.5; if(is.nw)dC+=.5;
  dC=Math.min(4,dC);
  const total=Math.min(10,dA+dB+dC);
  return{...is,total,sigLvl:sl.l,w:total*decay(i)};
}

function calc(){
  const cr=D.stability.cr,ar=D.stability.ar;
  const s11=cr<=.1?16:cr<=.2?14:cr<=.3?11:cr<=.5?7:cr<=1?3:0;
  const s12=ar<=.05?12:ar<=.1?10:ar<=.2?7:ar<=.4?3:0;
  const s13=D.stability.burst?0:8;
  const s14=D.stability.trend==="down"?4:D.stability.trend==="flat"?2:0;
  const stab=s11+s12+s13+s14;
  const list=ISSUES.crash.slice(0,20).map((is,i)=>scoreIssue(is,i));
  const W=list.reduce((s,x)=>s+x.w,0);
  const Wmax=Array.from({length:20},(_,i)=>10*decay(i)).reduce((a,b)=>a+b,0);
  const sev=Math.min(30,Math.max(0,Math.round(30*(1-W/Wmax))+Math.min(5,list.filter(x=>x.total>=7&&x.st!=="open").length)));
  const ft=D.ops.feat;
  const resp=D.ops.top10>=10?10:D.ops.top10>=8?8:D.ops.top10>=6?5:D.ops.top10>=4?3:0;
  const feat=Math.round(Math.min(8,(ft.symbol?2:0)+(ft.anr?2:0)+(ft.oom?1.5:0)+(ft.log?1:0)+(ft.alert?1:0)+(ft.ver?.5:0)));
  const logS=!D.ops.logSdk?0:D.ops.logRatio>=.6?2:D.ops.logRatio>=.3?1:0;
  const ops=resp+feat+logS;
  const sent=6;
  const total=stab+sev+ops+sent;
  return{total,stab,sev,ops,sent,sub:{stab:{s11,s12,s13,s14},ops:{resp,feat,log:logS}},list};
}

}

// ═══ 圆形仪表盘 ═══
function drawGauge(val){
  const cv=document.getElementById("gaugeCanvas");
  const dpr=window.devicePixelRatio||1;
  cv.width=180*dpr; cv.height=180*dpr;
  cv.style.width="180px"; cv.style.height="180px";
  const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,180,180);
  const cx=90,cy=95,R=72,sw=11;
  const start=Math.PI*.75,end=Math.PI*2.25;
  const total_arc=end-start;

  // 背景弧
  ctx.beginPath(); ctx.arc(cx,cy,R,start,end);
  ctx.strokeStyle="rgba(221,227,238,.9)"; ctx.lineWidth=sw; ctx.lineCap="round"; ctx.stroke();

  // 颜色分段背景
  const segs=[
    {from:0,to:.45,c:"#d32f2f"},{from:.45,to:.65,c:"#e65100"},
    {from:.65,to:.8,c:"#1565c0"},{from:.8,to:1,c:"#2e7d32"}
  ];
  segs.forEach(seg=>{
    ctx.beginPath();
    ctx.arc(cx,cy,R,start+seg.from*total_arc,start+seg.to*total_arc);
    ctx.strokeStyle=seg.c+"28"; ctx.lineWidth=sw; ctx.lineCap="butt"; ctx.stroke();
  });

  // 当前值弧（渐变）
  const pct=Math.min(val/100,1);
  if(pct>0){
    const segColor=val>=80?"#2e7d32":val>=65?"#1565c0":val>=45?"#e65100":"#d32f2f";
    const endAngle=start+pct*total_arc;
    const grad=ctx.createLinearGradient(
      cx+R*Math.cos(start),cy+R*Math.sin(start),
      cx+R*Math.cos(endAngle),cy+R*Math.sin(endAngle)
    );
    grad.addColorStop(0,segColor+"88");
    grad.addColorStop(1,segColor);
    ctx.beginPath(); ctx.arc(cx,cy,R,start,endAngle);
    ctx.strokeStyle=grad; ctx.lineWidth=sw; ctx.lineCap="round"; ctx.stroke();
    // 末端光点
    const ex=cx+R*Math.cos(endAngle), ey=cy+R*Math.sin(endAngle);
    ctx.beginPath(); ctx.arc(ex,ey,sw/2+2,0,Math.PI*2);
    ctx.fillStyle=segColor+"33"; ctx.fill();
    ctx.beginPath(); ctx.arc(ex,ey,sw/2,0,Math.PI*2);
    ctx.fillStyle=segColor; ctx.fill();
    ctx.beginPath(); ctx.arc(ex,ey,3.5,0,Math.PI*2);
    ctx.fillStyle="#fff"; ctx.fill();
  }

  // 刻度
  for(let i=0;i<=10;i++){
    const a=start+(i/10)*total_arc;
    const r1=R-sw/2-2,r2=R+sw/2+2;
    ctx.beginPath();
    ctx.moveTo(cx+r1*Math.cos(a),cy+r1*Math.sin(a));
    ctx.lineTo(cx+r2*Math.cos(a),cy+r2*Math.sin(a));
    ctx.strokeStyle=i%5===0?"rgba(120,136,160,.5)":"rgba(221,227,238,.8)";
    ctx.lineWidth=i%5===0?1.5:1; ctx.stroke();
  }

  // 标签
  [0,50,100].forEach((v,idx)=>{
    const a=start+(idx*0.5)*total_arc;
    const lr=R+22;
    ctx.fillStyle="rgba(136,153,176,.8)"; ctx.font="10px sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(v,cx+lr*Math.cos(a),cy+lr*Math.sin(a));
  });
}

// ═══ Hero ═══
function renderHero(){
  const lv=lvInfo(SC.total);
  const numEl=document.getElementById("gNum");
  numEl.style.color=totColor(SC.total);
  const lvEl=document.getElementById("gLv");
  lvEl.textContent=lv.t; lvEl.style.color=lv.c; lvEl.style.background=lv.bg;

  let cur=0;
  const step=Math.max(1,Math.ceil(SC.total/45));
  const tmr=setInterval(()=>{
    cur=Math.min(cur+step,SC.total);
    numEl.textContent=cur; drawGauge(cur);
    if(cur>=SC.total){clearInterval(tmr);drawGauge(SC.total);}
  },22);

  document.getElementById("hTitle").textContent=`质量评级：${lv.t}（${SC.total} 分）`;

  const critList=SC.list.filter(x=>x.total>=8&&x.st==="open");
  const coreOpen=SC.list.filter(x=>x.core&&x.st==="open");
  const oomOpen=[...ISSUES.oom].filter(x=>x.st!=="done");
  let descLines=[];
  descLines.push(`当前崩溃率 ${D.crashRate.toFixed(3)}% 超出行业良好基准（0.2%），7天次数崩溃率峰值 ${D.crashRateByCount.toFixed(3)}%，较上周上升 ${(((D.crashRateByCount-D.crashRateByCountPrev)/D.crashRateByCountPrev)*100).toFixed(0)}%。`);
  if(critList.length) descLines.push(`根因：${critList.length} 个高危问题（${critList.map(x=>x.id.slice(0,8)).join("、")}）持续未处理，合计影响 ${fmtDv(critList.reduce((s,x)=>s+x.dv,0))} 台设备，其中 ${coreOpen.filter(x=>x.total>=8).length} 个命中支付/首页核心路径。`);
  if(oomOpen.length) descLines.push(`OOM 监控未开启，${oomOpen.length} 个内存问题（影响 ${fmtDv(oomOpen.reduce((s,x)=>s+x.dv,0))} 台）无法精准归因，建议尽快开启以获取完整堆栈。`);
  descLines.push(`分析思路：① 优先修复 SIGSEGV libvbhook.so（影响最大，1.79w台）→ ② 处理支付/登录核心路径 NPE → ③ 解决主线程 ANR（7433台）→ ④ 开启 OOM 监控 + 配置突增告警。`);
  document.getElementById("hDesc").innerHTML=descLines.map((l,i)=>`<div style="margin-bottom:${i<descLines.length-1?"6px":"0"}">${l}</div>`).join("");

  const chips=[];
  if(D.stability.cr>0.3) chips.push(`<span class="chip chip-y">⚠ 崩溃率偏高</span>`);
  const crit=SC.list.filter(x=>x.total>=8&&x.st==="open").length;
  if(crit>0) chips.push(`<span class="chip chip-r">🚨 ${crit} 个高危未处理</span>`);
  if(!D.ops.feat.oom) chips.push(`<span class="chip chip-y">OOM 监控未开启</span>`);
  if(!D.ops.feat.alert) chips.push(`<span class="chip chip-b">告警未配置</span>`);
  if(!chips.length) chips.push(`<span class="chip chip-g">✓ 无紧急风险</span>`);
  document.getElementById("hChips").innerHTML=chips.join("");
}

// ═══ 健康度 ═══
function renderHealth(){
  const metrics=[
    {l:"设备崩溃率",v:D.crashRate,fmt:v=>v.toFixed(3)+"%",
     chg:((D.crashRate-D.crashRatePrev)/D.crashRatePrev*100),chgInv:true,
     ref:"基准≤0.2%",good:.1,bad:1,inv:true},
    {l:"次数崩溃率",v:D.crashRateByCount,fmt:v=>v.toFixed(3)+"%",
     chg:((D.crashRateByCount-D.crashRateByCountPrev)/D.crashRateByCountPrev*100),chgInv:true,
     ref:"较上周",good:.2,bad:2,inv:true},
    {l:"ANR 率",v:D.anrRate,fmt:v=>v.toFixed(3)+"%",
     chg:((D.anrRate-D.anrRatePrev)/D.anrRatePrev*100),chgInv:true,
     ref:"基准≤0.1%",good:.05,bad:.4,inv:true},
    {l:"FOOM 率",v:D.foomRate,fmt:v=>v.toFixed(3)+"%",
     chg:((D.foomRate-D.foomRatePrev)/D.foomRatePrev*100),chgInv:true,
     ref:"较上周",good:.02,bad:.2,inv:true},
    {l:"Top10 响应率",v:D.ops.top10/10,fmt:v=>(v*100).toFixed(0)+"%",
     chg:null,ref:"当前 "+D.ops.top10+"/10",good:1,bad:.4,inv:false},
    {l:"日志关联率",v:D.ops.logRatio,fmt:v=>(v*100).toFixed(0)+"%",
     chg:null,ref:"目标≥60%",good:.6,bad:.2,inv:false},
  ];

  document.getElementById("healthRows").innerHTML=metrics.map(m=>{
    const health=m.inv
      ?Math.max(0,Math.min(1,1-(m.v-m.good)/(m.bad-m.good)))
      :Math.max(0,Math.min(1,(m.v-m.bad)/(m.good-m.bad)));
    const c=health>=.7?"#2e7d32":health>=.4?"#e65100":"#d32f2f";
    const bgC=health>=.7?"rgba(46,125,50,.05)":health>=.4?"rgba(230,81,0,.05)":"rgba(211,47,47,.05)";
    let chgHtml="";
    if(m.chg!==null){
      const chgV=m.chg.toFixed(1);
      const isBad=m.chgInv?(m.chg>0):(m.chg<0);
      const chgCls=Math.abs(m.chg)<1?"mc2-chg-fl":isBad?"mc2-chg-up":"mc2-chg-dn";
      const arrow=m.chg>0?"↑":"↓";
      chgHtml=`<span class="mc2-chg ${chgCls}">${arrow}${Math.abs(+chgV)}%</span>`;
    }
    return `<div class="mc2" style="background:${bgC};border-color:${c}22;">
      <div class="mc2-top">
        <div class="mc2-lbl">${m.l}</div>
        <div style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0;margin-top:2px;box-shadow:0 0 6px ${c}66;"></div>
      </div>
      <div class="mc2-val" style="color:${c}">${m.fmt(m.v)}</div>
      <div class="mc2-foot">
        <span class="mc2-ref">${m.ref}</span>
        ${chgHtml}
      </div>
    </div>`;
  }).join("");
}

// ═══ 趋势 ═══
let curTrend="crash";
function switchTrend(el,k){
  const colors={crash:"#d32f2f",anr:"#e65100",foom:"#6a1b9a"};
  document.querySelectorAll(".trend-tab").forEach(t=>{
    t.classList.remove("act");
    t.style.background="";
    t.style.color="";
  });
  el.classList.add("act");
  el.style.background=colors[k]||"#1565c0";
  el.style.color="#fff";
  curTrend=k; drawTrend(k);

const TREND_CFG={
  crash:{label:"崩溃率 (%)",color:"#d32f2f",fill:"rgba(211,47,47,.12)"},
  anr:  {label:"ANR 率 (%)",color:"#e65100",fill:"rgba(230,81,0,.10)"},
  foom: {label:"FOOM 率 (%)",color:"#6a1b9a",fill:"rgba(106,27,154,.10)"},
  jank: {label:"卡顿率 (%)",color:"#1565c0",fill:"rgba(21,101,192,.10)"},
};

function drawTrend(key="crash"){
  const cv=document.getElementById("trendCanvas");
  const wrap=cv.parentElement;
  const W=wrap.clientWidth||360,H=wrap.clientHeight||160;
  const dpr=window.devicePixelRatio||1;
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+"px"; cv.style.height=H+"px";
  const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const data=D.trend[key];
  const cfg=TREND_CFG[key];
  const PAD={t:16,b:24,l:12,r:12};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const max=Math.max(...data)*1.35;
  const days=["3/24","3/25","3/26","3/27","3/28","3/29","3/30"];

  // 网格线
  for(let i=0;i<=3;i++){
    const y=PAD.t+cH*(1-i/3);
    ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(W-PAD.r,y);
    ctx.strokeStyle="rgba(221,227,238,.6)"; ctx.lineWidth=1; ctx.stroke();
  }

  const pts=data.map((v,i)=>({
    x:PAD.l+(i/(data.length-1))*cW,
    y:PAD.t+cH*(1-v/max)
  }));

  // Fill
  const grad=ctx.createLinearGradient(0,PAD.t,0,H-PAD.b);
  grad.addColorStop(0,cfg.fill.replace("0.12","0.28").replace("0.10","0.22"));
  grad.addColorStop(0.7,cfg.fill.replace("0.12","0.08").replace("0.10","0.06"));
  grad.addColorStop(1,"transparent");
  ctx.beginPath();
  ctx.moveTo(pts[0].x,H-PAD.b);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H-PAD.b);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();

  // Line
  ctx.beginPath();
  pts.forEach((p,i)=>{
    if(i===0){ctx.moveTo(p.x,p.y);return;}
    const pp=pts[i-1];
    const cpx=(pp.x+p.x)/2;
    ctx.bezierCurveTo(cpx,pp.y,cpx,p.y,p.x,p.y);
  });
  ctx.strokeStyle=cfg.color; ctx.lineWidth=2.5; ctx.lineJoin="round"; ctx.stroke();

  // Dots
  pts.forEach((p,i)=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fillStyle="#fff"; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,2.5,0,Math.PI*2);
    ctx.fillStyle=cfg.color; ctx.fill();
    ctx.fillStyle="rgba(26,34,54,.7)"; ctx.font="9px sans-serif"; ctx.textAlign="center";
    ctx.fillText(data[i].toFixed(2)+"%",p.x,p.y-9);
  });

  // X labels
  ctx.fillStyle="rgba(136,153,176,.9)"; ctx.font="9px sans-serif"; ctx.textAlign="center";
  days.forEach((d,i)=>{
    ctx.fillText(d,PAD.l+(i/(days.length-1))*cW,H-5);
  });
}

const tabCnts={crash:ISSUES.crash.length,anr:ISSUES.anr.length,oom:ISSUES.oom.length,jank:ISSUES.jank.length};

function switchTab(el,t){
  document.querySelectorAll(".itab").forEach(x=>x.classList.remove("act"));

function renderIssues(t){
  const list=ISSUES[t]||[];
  document.getElementById("iCntBdg").textContent=`共 ${list.length} 条`;
  const scored=list.map((is,i)=>scoreIssue(is,i));
  document.getElementById("iTbody").innerHTML=scored.map((is,i)=>{
    const rkC=i===0?"rk1":i===1?"rk2":i===2?"rk3":"rkn";
    const sv=is.total;
    const svC=sv>=9?"sp9":sv>=7?"sp7":sv>=5?"sp5":"sp3";
    const dvC=is.dv>=10000?"dvl":is.dv>=3000?"dvm":"";
    const sdC=is.st==="open"?"so":is.st==="processing"?"sp_":"sd";
    const stTxt=is.st==="open"?"待处理":is.st==="processing"?"处理中":"已处理";
    const sl=sigLvl(is.sig);
    const tags=[];
    if(sl.l==="Critical") tags.push(`<span class="tg tg-crit">Critical</span>`);
    else if(sl.l==="High") tags.push(`<span class="tg tg-hi">High</span>`);
    else tags.push(`<span class="tg tg-med">Medium</span>`);
    if(is.core) tags.push(`<span class="tg tg-core">核心路径</span>`);
    if(is.nw)   tags.push(`<span class="tg tg-new">新增</span>`);
    return `<tr>
      <td><span class="rk ${rkC}">${i+1}</span></td>
      <td><span class="iid">${is.id}</span></td>
      <td><div class="inm" title="${is.name}">${is.name}</div><div class="isig">${is.sig}</div></td>
      <td><span class="dv ${dvC}">${fmtDv(is.dv)}</span></td>
      <td><span class="sp ${svC}">${sv.toFixed(1)}</span></td>
      <td><div class="tags">${tags.join("")}</div></td>
      <td><div class="stxt"><span class="sdot ${sdC}"></span>${stTxt}</div></td>
    </tr>`;
  }).join("");
}
