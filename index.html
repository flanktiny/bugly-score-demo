<!DOCTYPE html>
<!-- v3.0.0 dark-tech -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bugly 智能质量评分 · Demo</title>
<style>
:root{
  /* ── 核心调色板 ── */
  --bg:        #0b0f1a;   /* 最深底色 */
  --bg1:       #0f1623;   /* 页面背景 */
  --bg2:       #141d2e;   /* 卡片背景 */
  --bg3:       #192236;   /* 卡片内次级背景 */
  --bg4:       #1f2b40;   /* hover / 高亮底 */
  --bg5:       #253349;   /* 更浅的强调底 */

  /* ── 边框 ── */
  --border:    rgba(255,255,255,.07);
  --border2:   rgba(255,255,255,.12);
  --border3:   rgba(255,255,255,.18);

  /* ── 文字 ── */
  --text:      #e2e8f4;
  --text2:     #8fa3be;
  --text3:     #4d6480;

  /* ── 主色蓝（科技感） ── */
  --blue:      #3b82f6;
  --blue-dim:  rgba(59,130,246,.12);
  --blue-bd:   rgba(59,130,246,.25);

  /* ── 语义色 ── */
  --red:       #f87171;
  --red-dim:   rgba(248,113,113,.12);
  --red-bd:    rgba(248,113,113,.25);

  --orange:    #fb923c;
  --orange-dim:rgba(251,146,60,.12);
  --orange-bd: rgba(251,146,60,.25);

  --green:     #34d399;
  --green-dim: rgba(52,211,153,.12);
  --green-bd:  rgba(52,211,153,.25);

  --purple:    #a78bfa;
  --purple-dim:rgba(167,139,250,.12);
  --purple-bd: rgba(167,139,250,.25);

  --cyan:      #22d3ee;
  --cyan-dim:  rgba(34,211,238,.1);
  --cyan-bd:   rgba(34,211,238,.2);

  /* ── 圆角 ── */
  --r:  14px;
  --rs: 9px;

  /* ── 阴影 ── */
  --shadow:    0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.35);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.5);
  --glow-blue: 0 0 20px rgba(59,130,246,.15);
}

*{ box-sizing:border-box; margin:0; padding:0; }
body{
  background:var(--bg1);
  color:var(--text);
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ─────── Header ─────── */
.hdr{
  height:54px;
  background:rgba(11,15,26,.88);
  border-bottom:1px solid var(--border2);
  display:flex; align-items:center; padding:0 28px; gap:14px;
  position:sticky; top:0; z-index:100;
  backdrop-filter:blur(16px);
  box-shadow:0 1px 0 var(--border), 0 4px 20px rgba(0,0,0,.4);
}
.hdr-logo{
  width:32px; height:32px;
  background:linear-gradient(135deg,#1d4ed8 0%,#3b82f6 60%,#60a5fa 100%);
  border-radius:9px; display:flex; align-items:center; justify-content:center;
  font-weight:900; color:#fff; font-size:15px; letter-spacing:-1px;
  box-shadow:0 0 0 1px rgba(96,165,250,.3), 0 4px 12px rgba(59,130,246,.4);
}
.hdr-title{ font-size:14px; font-weight:700; color:var(--text); letter-spacing:.2px; }
.hdr-sep{ width:1px; height:14px; background:var(--border2); }
.hdr-app{ font-size:12px; color:var(--text2); }
.hdr-r{ margin-left:auto; display:flex; align-items:center; gap:8px; }
.pill{
  font-size:11px; color:var(--text2);
  background:var(--bg3); border:1px solid var(--border2);
  padding:4px 11px; border-radius:20px;
}
.btn{
  font-size:11px; color:var(--blue);
  background:var(--blue-dim); border:1px solid var(--blue-bd);
  padding:4px 12px; border-radius:20px; cursor:pointer; transition:.15s;
}
.btn:hover{ background:rgba(59,130,246,.2); border-color:rgba(59,130,246,.4); }
.ts{ font-size:10px; color:var(--text3); }

/* ─────── Wrap ─────── */
.wrap{ max-width:1300px; margin:0 auto; padding:22px 28px 52px; }

/* ─────── Section label ─────── */
.sec{
  font-size:10px; font-weight:700; color:var(--text3);
  letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom:13px; display:flex; align-items:center; gap:9px;
}
.sec-line{
  flex:1; height:1px;
  background:linear-gradient(90deg,var(--border2) 0%,transparent 100%);
}

/* ─────── Hero ─────── */
.hero{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:18px;
  padding:28px 32px;
  margin-bottom:22px;
  display:grid;
  grid-template-columns:210px 1fr;
  gap:36px;
  align-items:center;
  box-shadow:var(--shadow);
  position:relative; overflow:hidden;
}
.hero::before{
  content:''; position:absolute; top:-60px; right:-60px;
  width:300px; height:300px; border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,.06) 0%,transparent 65%);
  pointer-events:none;
}
.hero::after{
  content:''; position:absolute; bottom:-40px; left:30%;
  width:200px; height:200px; border-radius:50%;
  background:radial-gradient(circle,rgba(34,211,238,.03) 0%,transparent 65%);
  pointer-events:none;
}

/* 仪表盘 */
.gauge-wrap{ position:relative; width:190px; height:190px; flex-shrink:0; }
#gaugeCanvas{ display:block; }
.gauge-center{
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-52%); text-align:center;
}
.gauge-num{
  font-size:50px; font-weight:900; line-height:1;
  letter-spacing:-3px;
  text-shadow:0 0 30px currentColor;
}
.gauge-denom{ font-size:11px; color:var(--text3); margin-top:2px; }
.gauge-lv{
  display:inline-block; font-size:10px; font-weight:700;
  padding:2px 10px; border-radius:20px; margin-top:7px; letter-spacing:.3px;
}

/* Hero Right */
.hero-main{ font-size:19px; font-weight:800; margin-bottom:8px; color:var(--text); letter-spacing:-.3px; }
.hero-desc{ font-size:12px; color:var(--text2); line-height:1.8; margin-bottom:15px; }
.chips{ display:flex; flex-wrap:wrap; gap:6px; }
.chip{
  font-size:11px; padding:3px 11px; border-radius:20px;
  font-weight:600; display:inline-flex; align-items:center; gap:4px;
}
.chip-r{ background:var(--red-dim); color:var(--red); border:1px solid var(--red-bd); }
.chip-y{ background:var(--orange-dim); color:var(--orange); border:1px solid var(--orange-bd); }
.chip-g{ background:var(--green-dim); color:var(--green); border:1px solid var(--green-bd); }
.chip-b{ background:var(--blue-dim); color:var(--blue); border:1px solid var(--blue-bd); }

/* ─────── 待修复项 ─────── */
.fix-card{
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--r); overflow:hidden;
  margin-bottom:24px; box-shadow:var(--shadow);
}
.fix-group{}
.fix-group-hdr{
  padding:11px 20px;
  background:linear-gradient(90deg,var(--bg3) 0%,var(--bg2) 100%);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
  cursor:pointer; user-select:none; transition:background .12s;
}
.fix-group-hdr:hover{ background:linear-gradient(90deg,var(--bg4) 0%,var(--bg3) 100%); }
.fix-group-icon{ font-size:14px; }
.fix-group-name{ font-size:13px; font-weight:700; flex:1; }
.fix-group-meta{ display:flex; align-items:center; gap:8px; }
.fix-group-cnt{
  font-size:10px; color:var(--text3);
  background:var(--bg5); padding:1px 7px; border-radius:10px; border:1px solid var(--border2);
}
.fix-group-score{ font-size:11px; color:var(--text3); }
.fix-group-arrow{ font-size:9px; color:var(--text3); transition:.15s; }
.fix-group-arrow.open{ transform:rotate(90deg); }
.fix-items{ display:none; }
.fix-items.open{ display:block; }
.fix-item{
  padding:10px 20px 10px 54px; border-bottom:1px solid var(--border);
  display:flex; align-items:flex-start; gap:10px; transition:background .1s;
}
.fix-item:last-child{ border-bottom:none; }
.fix-item:hover{ background:var(--bg3); }
.fi-prio{ font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; flex-shrink:0; margin-top:1px; }
.pi-urg{ background:var(--red-dim); color:var(--red); border:1px solid var(--red-bd); }
.pi-hi{  background:var(--orange-dim); color:var(--orange); border:1px solid var(--orange-bd); }
.pi-med{ background:var(--blue-dim); color:var(--blue); border:1px solid var(--blue-bd); }
.fi-body{ flex:1; min-width:0; }
.fi-title{ font-size:13px; font-weight:500; margin-bottom:2px; color:var(--text); }
.fi-desc{ font-size:12px; color:var(--text2); line-height:1.5; }
.fi-gain{ font-size:12px; font-weight:700; color:var(--green); white-space:nowrap; flex-shrink:0; padding-top:1px; }

/* ─────── Grid ─────── */
.row2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:22px; }
.row4{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }

/* ─────── Dim cards ─────── */
.dim{
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--r); padding:20px 22px;
  box-shadow:var(--shadow);
  transition:box-shadow .2s, border-color .2s, transform .15s;
  position:relative; overflow:hidden;
}
.dim:hover{
  box-shadow:var(--shadow-lg); border-color:var(--border3);
  transform:translateY(-1px);
}
.dim-shine{
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
}
.dim-top{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; }
.dim-ic{ width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:19px; }
.dim-score{ font-size:32px; font-weight:900; line-height:1; letter-spacing:-1px; }
.dim-denom{ font-size:11px; color:var(--text3); }
.dim-name{ font-size:13px; font-weight:700; margin-bottom:2px; color:var(--text); }
.dim-sub{ font-size:11px; color:var(--text3); }
.dim-bar{ height:3px; background:var(--bg5); border-radius:2px; overflow:hidden; margin-bottom:13px; }
.dim-bar-f{ height:100%; border-radius:2px; transition:width .8s cubic-bezier(.16,1,.3,1); }
.sub-rows{ display:flex; flex-direction:column; gap:8px; }
.sub-row{ display:flex; align-items:center; gap:7px; font-size:12px; }
.sub-nm{ color:var(--text2); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sub-bw{ width:48px; height:3px; background:var(--bg5); border-radius:2px; overflow:hidden; flex-shrink:0; }
.sub-bf{ height:100%; border-radius:2px; }
.sub-pt{ font-size:11px; font-weight:700; min-width:32px; text-align:right; }

/* ─────── Health card ─────── */
.health-card{
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--r); padding:18px 20px;
  box-shadow:var(--shadow);
}
.health-card h4{ font-size:13px; font-weight:700; margin-bottom:14px; color:var(--text); }
.metric-grid{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.mc2{
  background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--rs); padding:12px 14px;
  position:relative; overflow:hidden;
  transition:border-color .15s, background .15s;
}
.mc2:hover{ background:var(--bg4); border-color:var(--border2); }
.mc2-top{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:6px; }
.mc2-lbl{ font-size:11px; color:var(--text2); line-height:1.3; }
.mc2-dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:2px; }
.mc2-val{ font-size:20px; font-weight:900; line-height:1; letter-spacing:-.5px; margin-bottom:6px; }
.mc2-foot{ display:flex; align-items:center; gap:5px; }
.mc2-ref{ font-size:10px; color:var(--text3); }
.mc2-chg{ font-size:10px; font-weight:600; padding:1px 5px; border-radius:3px; }
.mc2-chg-up{ background:var(--red-dim); color:var(--red); }
.mc2-chg-dn{ background:var(--green-dim); color:var(--green); }
.mc2-chg-fl{ background:rgba(255,255,255,.05); color:var(--text3); }

/* ─────── Trend card ─────── */
.trend-card{
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--r); padding:18px 20px;
  display:flex; flex-direction:column;
  box-shadow:var(--shadow);
}
.trend-hdr{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-shrink:0; }
.trend-hdr h4{ font-size:13px; font-weight:700; color:var(--text); }
.trend-tabs{
  display:flex; gap:0;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:9px; overflow:hidden; flex-shrink:0;
}
.trend-tab{
  font-size:11px; padding:5px 14px;
  color:var(--text2); cursor:pointer;
  transition:.15s; white-space:nowrap;
  border-right:1px solid var(--border2);
  font-weight:500;
}
.trend-tab:last-child{ border-right:none; }
.trend-tab:hover{ color:var(--text); background:var(--bg4); }
.trend-tab.act{ color:#fff; font-weight:700; }
.trend-canvas-wrap{ flex:1; position:relative; min-height:155px; margin-top:6px; }

/* ─────── Issues ─────── */
.issues-card{
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--r); overflow:hidden;
  margin-bottom:24px; box-shadow:var(--shadow);
}
.issues-hdr{ padding:16px 20px 0; border-bottom:1px solid var(--border2); }
.issues-hdr-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.issues-hdr-top h3{ font-size:14px; font-weight:700; color:var(--text); }
.itabs{ display:flex; }
.itab{
  padding:8px 16px; font-size:13px; color:var(--text2);
  cursor:pointer; border-bottom:2px solid transparent;
  transition:.12s; display:flex; align-items:center; gap:5px; white-space:nowrap;
  font-weight:500;
}
.itab:hover{ color:var(--text); }
.itab.act{ color:var(--blue); border-bottom-color:var(--blue); font-weight:700; }
.itab .tc{
  font-size:10px; background:var(--bg3); padding:1px 6px;
  border-radius:10px; border:1px solid var(--border2); transition:.12s;
}
.itab.act .tc{ background:var(--blue-dim); color:var(--blue); border-color:var(--blue-bd); }
.tbl-wrap{ overflow-x:auto; }
table{ width:100%; border-collapse:collapse; font-size:13px; }
thead tr{ background:var(--bg3); }
th{
  padding:10px 16px; text-align:left;
  font-size:10px; color:var(--text3);
  font-weight:700; text-transform:uppercase; letter-spacing:.7px;
  white-space:nowrap; border-bottom:1px solid var(--border2);
}
td{ padding:11px 16px; border-bottom:1px solid var(--border); vertical-align:middle; }
tr:last-child td{ border-bottom:none; }
tbody tr:hover td{ background:var(--bg3); }
.rk{ width:24px; height:24px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
.rk1{ background:linear-gradient(135deg,#92400e,#f59e0b); color:#fff; box-shadow:0 2px 8px rgba(245,158,11,.3); }
.rk2{ background:linear-gradient(135deg,#374151,#6b7280); color:#fff; }
.rk3{ background:linear-gradient(135deg,#713f12,#d97706); color:#fff; }
.rkn{ background:var(--bg4); color:var(--text3); border:1px solid var(--border2); }
.iid{
  font-family:'SF Mono',Consolas,monospace; font-size:11px;
  color:var(--cyan); background:var(--cyan-dim);
  padding:2px 7px; border-radius:4px; border:1px solid var(--cyan-bd);
}
.inm{ max-width:260px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500; }
.isig{ font-size:11px; color:var(--text3); margin-top:2px; }
.sp{ display:inline-flex; align-items:center; justify-content:center; min-width:36px; height:21px; border-radius:5px; font-size:11px; font-weight:700; padding:0 7px; }
.sp9{ background:var(--red-dim); color:var(--red); border:1px solid var(--red-bd); }
.sp7{ background:var(--orange-dim); color:var(--orange); border:1px solid var(--orange-bd); }
.sp5{ background:var(--blue-dim); color:var(--blue); border:1px solid var(--blue-bd); }
.sp3{ background:var(--bg5); color:var(--text3); border:1px solid var(--border2); }
.dv{ font-weight:700; }
.dvl{ color:var(--red); }
.dvm{ color:var(--orange); }
.tags{ display:flex; flex-wrap:wrap; gap:3px; }
.tg{ font-size:10px; padding:2px 7px; border-radius:10px; font-weight:600; }
.tg-crit{ background:var(--red-dim); color:var(--red); border:1px solid var(--red-bd); }
.tg-hi{   background:var(--orange-dim); color:var(--orange); border:1px solid var(--orange-bd); }
.tg-core{ background:var(--purple-dim); color:var(--purple); border:1px solid var(--purple-bd); }
.tg-new{  background:var(--green-dim); color:var(--green); border:1px solid var(--green-bd); }
.tg-med{  background:var(--bg5); color:var(--text3); border:1px solid var(--border2); }
.sdot{ width:6px; height:6px; border-radius:50%; display:inline-block; margin-right:4px; }
.so{ background:var(--red); box-shadow:0 0 5px var(--red); }
.sp_{ background:var(--orange); box-shadow:0 0 5px var(--orange); }
.sd{ background:var(--green); }
.stxt{ font-size:12px; display:flex; align-items:center; }

/* ─────── Sentiment ─────── */
.sent-card{
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--r); overflow:hidden;
  box-shadow:var(--shadow);
}
.sent-hdr{
  padding:11px 18px; border-bottom:1px solid var(--border2);
  font-size:12px; font-weight:700; color:var(--text);
  background:var(--bg3);
  display:flex; align-items:center; justify-content:space-between;
}
.sent-body{ padding:14px 18px; }
.sent-store{
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 0; border-bottom:1px solid var(--border);
}
.sent-store:last-of-type{ border-bottom:none; }
.sent-plat{ font-size:13px; font-weight:600; color:var(--text); }
.sent-right{ display:flex; align-items:center; gap:8px; }
.sent-rt{ font-size:14px; font-weight:700; }
.sent-cnt{ font-size:11px; color:var(--text3); }
.sent-sample{ font-size:11px; color:var(--text3); margin-top:3px; line-height:1.5; }

/* ─────── Footer ─────── */
.foot{
  text-align:center; padding:18px; color:var(--text3);
  font-size:11px; border-top:1px solid var(--border);
  background:var(--bg);
}

/* ─────── Scrollbar ─────── */
::-webkit-scrollbar{ width:4px; height:4px; }
::-webkit-scrollbar-track{ background:var(--bg2); }
::-webkit-scrollbar-thumb{ background:var(--bg5); border-radius:3px; }
::-webkit-scrollbar-thumb:hover{ background:var(--blue); }

/* ─────── Animations ─────── */
@keyframes spin{ to{ transform:rotate(360deg); } }
.spin{ animation:spin .7s linear infinite; }
@keyframes fadeUp{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
.wrap > *{ animation:fadeUp .35s ease both; }
.wrap > *:nth-child(2){ animation-delay:.04s; }
.wrap > *:nth-child(3){ animation-delay:.08s; }
.wrap > *:nth-child(4){ animation-delay:.12s; }
.wrap > *:nth-child(5){ animation-delay:.16s; }
.wrap > *:nth-child(6){ animation-delay:.20s; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">B</div>
  <div class="hdr-title">智能质量评分</div>
  <div class="hdr-sep"></div>
  <div class="hdr-app">泛互电商 App · 示例</div>
  <div class="hdr-r">
    <div class="pill">📅 最近 7 天</div>
    <div class="btn" onclick="refresh(this)"><span id="ri">↻</span> 刷新</div>
    <div class="ts" id="ts">—</div>
  </div>
</div>

<div class="wrap">

<!-- Hero -->
<div class="hero">
  <div class="gauge-wrap">
    <canvas id="gaugeCanvas" width="190" height="190"></canvas>
    <div class="gauge-center">
      <div class="gauge-num" id="gNum" style="color:#fb923c">0</div>
      <div class="gauge-denom">/ 100</div>
      <div class="gauge-lv" id="gLv">—</div>
    </div>
  </div>
  <div class="hero-sum">
    <div class="hero-main" id="hTitle">正在评分...</div>
    <div class="hero-desc" id="hDesc">—</div>
    <div class="chips" id="hChips"></div>
  </div>
</div>

<!-- 待修复项 -->
<div class="sec">
  待修复项
  <span id="fixTotal" style="font-size:10px;color:var(--text3);font-weight:400;letter-spacing:0;text-transform:none;">—</span>
  <span class="sec-line"></span>
</div>
<div class="fix-card" id="fixCard"></div>

<!-- 评分维度 -->

function decay(i){return 1/Math.log(i+2);}
function sigLvl(sig){
  if(["SIGSEGV","SIGABRT","SIGTRAP"].includes(sig))return{l:"Critical",s:2};
  if(["OOM","ANR","FOOM"].includes(sig))return{l:"High",s:1};
  return{l:"Medium",s:0};
}
function scoreIssue(is,i){
  const dA=is.dv>=10000?4:is.dv>=5000?3:is.dv>=1000?2:is.dv>=200?1:.5;
  const dB=(is.sig==="SIGSEGV"||is.sig==="SIGABRT")?2:(is.sig==="ANR"||is.sig==="OOM"||is.sig==="FOOM")?1.5:is.sig==="JANK"?1:1.5;
  const sl=sigLvl(is.sig);
  let dC=sl.s;
  if(is.core)dC+=1.5; if(is.nw)dC+=.5;
  dC=Math.min(4,dC);
  const total=Math.min(10,dA+dB+dC);
  return{...is,total,sigLvl:sl.l,w:total*decay(i)};
}
function calc(){
  const cr=D.stability.cr,ar=D.stability.ar;
  const s11=cr<=.1?16:cr<=.2?14:cr<=.3?11:cr<=.5?7:cr<=1?3:0;
  const s12=ar<=.05?12:ar<=.1?10:ar<=.2?7:ar<=.4?3:0;
  const s13=D.stability.burst?0:8;
  const s14=D.stability.trend==="down"?4:D.stability.trend==="flat"?2:0;
  const stab=s11+s12+s13+s14;
  const list=ISSUES.crash.slice(0,20).map((is,i)=>scoreIssue(is,i));
  const W=list.reduce((s,x)=>s+x.w,0);
  const Wmax=Array.from({length:20},(_,i)=>10*decay(i)).reduce((a,b)=>a+b,0);
  const sev=Math.min(30,Math.max(0,Math.round(30*(1-W/Wmax))+Math.min(5,list.filter(x=>x.total>=7&&x.st!=="open").length)));
  const ft=D.ops.feat;
  const resp=D.ops.top10>=10?10:D.ops.top10>=8?8:D.ops.top10>=6?5:D.ops.top10>=4?3:0;
  const feat=Math.round(Math.min(8,(ft.symbol?2:0)+(ft.anr?2:0)+(ft.oom?1.5:0)+(ft.log?1:0)+(ft.alert?1:0)+(ft.ver?.5:0)));
  const logS=!D.ops.logSdk?0:D.ops.logRatio>=.6?2:D.ops.logRatio>=.3?1:0;
  const ops=resp+feat+logS;
  const sent=6;
  const total=stab+sev+ops+sent;
  return{total,stab,sev,ops,sent,sub:{stab:{s11,s12,s13,s14},ops:{resp,feat,log:logS}},list};
}
const SC=calc();

function scColor(s,m){

function totColor(s){return s>=80?"#34d399":s>=65?"#3b82f6":s>=45?"#fb923c":"#f87171";}
function lvInfo(s){

  return      {t:"较差",  c:"#f87171",bg:"rgba(248,113,113,.15)"};
}
function fmtDv(n){return n>=10000?(n/10000).toFixed(1)+"w":n.toLocaleString();}

/* ═══ 圆形仪表盘 ═══ */
function drawGauge(val){
  const cv=document.getElementById("gaugeCanvas");
  const dpr=window.devicePixelRatio||1;
  cv.width=190*dpr; cv.height=190*dpr;
  cv.style.width="190px"; cv.style.height="190px";
  const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,190,190);

  const cx=95,cy=95,R=72,sw=11;
  const start=Math.PI*.75,end=Math.PI*2.25,arc=end-start;

  /* 外发光环（控制尺寸：R+10+lineWidth/2 必须 < cx=95，即 ≤94） */
  ctx.beginPath(); ctx.arc(cx,cy,R+10,start,end);
  ctx.strokeStyle="rgba(59,130,246,.05)"; ctx.lineWidth=18; ctx.lineCap="butt"; ctx.stroke();

  /* 背景轨道 — 方头对齐弧线边界，防止圆头突出到缺口透明区 */
  ctx.beginPath(); ctx.arc(cx,cy,R,start,end);
  ctx.strokeStyle="rgba(255,255,255,.08)"; ctx.lineWidth=sw; ctx.lineCap="butt"; ctx.stroke();

  /* 当前值弧 */
  const pct=Math.min(val/100,1);
  if(pct>0){
    const segColor=totColor(val);
    const endA=start+pct*arc;
    const grad=ctx.createLinearGradient(cx+R*Math.cos(start),cy+R*Math.sin(start),cx+R*Math.cos(endA),cy+R*Math.sin(endA));
    grad.addColorStop(0,segColor+"55"); grad.addColorStop(1,segColor);
    ctx.beginPath(); ctx.arc(cx,cy,R,start,endA);
    ctx.strokeStyle=grad; ctx.lineWidth=sw; ctx.lineCap="round"; ctx.stroke();
    /* 末端光晕 */
    const ex=cx+R*Math.cos(endA),ey=cy+R*Math.sin(endA);
    const g2=ctx.createRadialGradient(ex,ey,0,ex,ey,sw);
    g2.addColorStop(0,segColor+"66"); g2.addColorStop(1,"transparent");
    ctx.beginPath(); ctx.arc(ex,ey,sw,0,Math.PI*2);
    ctx.fillStyle=g2; ctx.fill();
    ctx.beginPath(); ctx.arc(ex,ey,sw/2-1,0,Math.PI*2);
    ctx.fillStyle=segColor; ctx.fill();
    ctx.beginPath(); ctx.arc(ex,ey,3,0,Math.PI*2);
    ctx.fillStyle="#fff"; ctx.fill();
  }

  /* 刻度 */
  for(let i=0;i<=10;i++){
    const a=start+(i/10)*arc;
    const r1=R-sw/2-3,r2=R+sw/2+3;
    ctx.beginPath();
    ctx.moveTo(cx+r1*Math.cos(a),cy+r1*Math.sin(a));
    ctx.lineTo(cx+r2*Math.cos(a),cy+r2*Math.sin(a));
    ctx.strokeStyle=i%5===0?"rgba(255,255,255,.18)":"rgba(255,255,255,.06)";
    ctx.lineWidth=i%5===0?1.5:1; ctx.stroke();
  }
  /* 标签 */
  [[0,0],[50,.5],[100,1]].forEach(([v,f])=>{
    const a=start+f*arc,lr=R+20;
    ctx.fillStyle="rgba(77,100,128,.9)"; ctx.font="10px sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(v,cx+lr*Math.cos(a),cy+lr*Math.sin(a));
  });
}

/* ═══ Hero ═══ */
function renderHero(){
  const lv=lvInfo(SC.total);
  const numEl=document.getElementById("gNum");
  numEl.style.color=totColor(SC.total);
  numEl.style.textShadow="0 0 30px "+totColor(SC.total)+"88";
  const lvEl=document.getElementById("gLv");
  lvEl.textContent=lv.t; lvEl.style.color=lv.c;
  lvEl.style.background=lv.bg; lvEl.style.border="1px solid "+lv.c+"40";

  let cur=0;
  const step=Math.max(1,Math.ceil(SC.total/40));
  const tmr=setInterval(()=>{
    cur=Math.min(cur+step,SC.total);
    numEl.textContent=cur; drawGauge(cur);
    if(cur>=SC.total){clearInterval(tmr);drawGauge(SC.total);}
  },22);

  document.getElementById("hTitle").textContent=`质量评级：${lv.t}（${SC.total} 分）`;
  const critList=SC.list.filter(x=>x.total>=8&&x.st==="open");
  const coreOpen=SC.list.filter(x=>x.core&&x.st==="open");
  const oomOpen=[...ISSUES.oom].filter(x=>x.st!=="done");
  const descLines=[
    `当前崩溃率 <strong style="color:var(--red)">${D.crashRate.toFixed(3)}%</strong> 超出行业良好基准（0.2%），7天次数崩溃率峰值 ${D.crashRateByCount.toFixed(3)}%，较上周上升 ${(((D.crashRateByCount-D.crashRateByCountPrev)/D.crashRateByCountPrev)*100).toFixed(0)}%。`,
    critList.length?`根因：${critList.length} 个高危问题（${critList.map(x=>`<span style="color:var(--cyan);font-family:monospace">${x.id}</span>`).join("、")}）持续未处理，合计影响 <strong style="color:var(--red)">${fmtDv(critList.reduce((s,x)=>s+x.dv,0))}</strong> 台设备。`:"",
    oomOpen.length?`OOM 监控未开启，${oomOpen.length} 个内存问题（影响 ${fmtDv(oomOpen.reduce((s,x)=>s+x.dv,0))} 台）无法精准归因，建议尽快开启以获取完整堆栈。`:"",
    `建议优先级：① 修复 SIGSEGV libvbhook.so → ② 处理支付/登录核心 NPE → ③ 解决主线程 ANR → ④ 开启 OOM 监控。`
  ].filter(Boolean);
  document.getElementById("hDesc").innerHTML=descLines.map((l,i)=>`<div style="margin-bottom:${i<descLines.length-1?"7px":"0"}">${l}</div>`).join("");

  const chips=[];
  if(D.stability.cr>0.3) chips.push(`<span class="chip chip-y">⚠ 崩溃率偏高</span>`);
  const crit=SC.list.filter(x=>x.total>=8&&x.st==="open").length;
  if(crit>0) chips.push(`<span class="chip chip-r">● ${crit} 个高危未处理</span>`);
  if(!D.ops.feat.oom) chips.push(`<span class="chip chip-y">OOM 监控未开启</span>`);
  if(!D.ops.feat.alert) chips.push(`<span class="chip chip-b">告警未配置</span>`);
  if(!chips.length) chips.push(`<span class="chip chip-g">✓ 无紧急风险</span>`);
  document.getElementById("hChips").innerHTML=chips.join("");
}

function renderHealth(){
  const metrics=[
    {l:"设备崩溃率",v:D.crashRate,fmt:v=>v.toFixed(3)+"%",chg:((D.crashRate-D.crashRatePrev)/D.crashRatePrev*100),chgInv:true,ref:"基准≤0.2%",good:.1,bad:1,inv:true},
    {l:"次数崩溃率",v:D.crashRateByCount,fmt:v=>v.toFixed(3)+"%",chg:((D.crashRateByCount-D.crashRateByCountPrev)/D.crashRateByCountPrev*100),chgInv:true,ref:"较上周",good:.2,bad:2,inv:true},
    {l:"ANR 率",v:D.anrRate,fmt:v=>v.toFixed(3)+"%",chg:((D.anrRate-D.anrRatePrev)/D.anrRatePrev*100),chgInv:true,ref:"基准≤0.1%",good:.05,bad:.4,inv:true},
    {l:"FOOM 率",v:D.foomRate,fmt:v=>v.toFixed(3)+"%",chg:((D.foomRate-D.foomRatePrev)/D.foomRatePrev*100),chgInv:true,ref:"较上周",good:.02,bad:.2,inv:true},
    {l:"Top10 响应率",v:D.ops.top10/10,fmt:v=>(v*100).toFixed(0)+"%",chg:null,ref:"当前 "+D.ops.top10+"/10",good:1,bad:.4,inv:false},
    {l:"日志关联率",v:D.ops.logRatio,fmt:v=>(v*100).toFixed(0)+"%",chg:null,ref:"目标≥60%",good:.6,bad:.2,inv:false},
  ];
  document.getElementById("healthRows").innerHTML=metrics.map(m=>{
    const health=m.inv?Math.max(0,Math.min(1,1-(m.v-m.good)/(m.bad-m.good))):Math.max(0,Math.min(1,(m.v-m.bad)/(m.good-m.bad)));
    const c=health>=.7?"#34d399":health>=.4?"#fb923c":"#f87171";
    const bgBd=health>=.7?"rgba(52,211,153,.08)":health>=.4?"rgba(251,146,60,.08)":"rgba(248,113,113,.08)";
    const bdCol=health>=.7?"rgba(52,211,153,.2)":health>=.4?"rgba(251,146,60,.2)":"rgba(248,113,113,.2)";
    let chgHtml="";
    if(m.chg!==null){
      const chgV=m.chg.toFixed(1);
      const isBad=m.chgInv?(m.chg>0):(m.chg<0);
      const cls=Math.abs(m.chg)<1?"mc2-chg-fl":isBad?"mc2-chg-up":"mc2-chg-dn";
      chgHtml=`<span class="mc2-chg ${cls}">${m.chg>0?"↑":"↓"}${Math.abs(+chgV)}%</span>`;
    }
    return`<div class="mc2" style="background:${bgBd};border-color:${bdCol};">
      <div class="mc2-top">
        <div class="mc2-lbl">${m.l}</div>
        <div class="mc2-dot" style="background:${c};box-shadow:0 0 7px ${c}99;"></div>
      </div>
      <div class="mc2-val" style="color:${c};text-shadow:0 0 12px ${c}44;">${m.fmt(m.v)}</div>
      <div class="mc2-foot">
        <span class="mc2-ref">${m.ref}</span>
        ${chgHtml}
      </div>
    </div>`;
  }).join("");
}

/* ═══ 趋势 ═══ */
const TREND_CFG={
  crash:{color:"#f87171",fill:"rgba(248,113,113,"},
  anr:  {color:"#fb923c",fill:"rgba(251,146,60,"},
  foom: {color:"#a78bfa",fill:"rgba(167,139,250,"},
};
function switchTrend(el,k){
  const cfg=TREND_CFG[k];
  document.querySelectorAll(".trend-tab").forEach(t=>{
    t.classList.remove("act");
    t.style.background=""; t.style.color="";
  });
  el.classList.add("act");
  el.style.background=cfg.fill+"0.2)";
  el.style.color=cfg.color;
  drawTrend(k);
}
function drawTrend(key="crash"){
  const cv=document.getElementById("trendCanvas");
  const wrap=cv.parentElement;
  const W=wrap.clientWidth||360,H=wrap.clientHeight||160;
  const dpr=window.devicePixelRatio||1;
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+"px"; cv.style.height=H+"px";
  const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const data=D.trend[key];
  const cfg=TREND_CFG[key];
  const PAD={t:18,b:26,l:14,r:14};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const max=Math.max(...data)*1.35;
  const days=["3/24","3/25","3/26","3/27","3/28","3/29","3/30"];

  /* 网格 */
  for(let i=0;i<=3;i++){
    const y=PAD.t+cH*(1-i/3);
    ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(W-PAD.r,y);
    ctx.strokeStyle=i===0?"rgba(255,255,255,.04)":"rgba(255,255,255,.04)";
    if(i>0){
      ctx.setLineDash([3,5]); ctx.strokeStyle="rgba(255,255,255,.06)";
    } else {
      ctx.setLineDash([]);
    }
    ctx.lineWidth=1; ctx.stroke(); ctx.setLineDash([]);
  }

  const pts=data.map((v,i)=>({x:PAD.l+(i/(data.length-1))*cW,y:PAD.t+cH*(1-v/max)}));

  /* fill */
  const grad=ctx.createLinearGradient(0,PAD.t,0,H-PAD.b);
  grad.addColorStop(0,cfg.fill+"0.25)");
  grad.addColorStop(.6,cfg.fill+"0.07)");
  grad.addColorStop(1,cfg.fill+"0)");
  ctx.beginPath();
  ctx.moveTo(pts[0].x,H-PAD.b);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H-PAD.b);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();

  /* glow line */
  ctx.save();
  ctx.shadowColor=cfg.color; ctx.shadowBlur=8;
  ctx.beginPath();
  pts.forEach((p,i)=>{
    if(i===0){ctx.moveTo(p.x,p.y);return;}
    const pp=pts[i-1],cpx=(pp.x+p.x)/2;
    ctx.bezierCurveTo(cpx,pp.y,cpx,p.y,p.x,p.y);
  });
  ctx.strokeStyle=cfg.color+"aa"; ctx.lineWidth=3; ctx.lineJoin="round"; ctx.stroke();
  ctx.restore();
  /* base line */
  ctx.beginPath();
  pts.forEach((p,i)=>{
    if(i===0){ctx.moveTo(p.x,p.y);return;}
    const pp=pts[i-1],cpx=(pp.x+p.x)/2;
    ctx.bezierCurveTo(cpx,pp.y,cpx,p.y,p.x,p.y);
  });
  ctx.strokeStyle=cfg.color; ctx.lineWidth=2; ctx.stroke();

  /* dots */
  pts.forEach((p,i)=>{
    ctx.save(); ctx.shadowColor=cfg.color; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fillStyle=cfg.color+"33"; ctx.fill(); ctx.restore();
    ctx.beginPath(); ctx.arc(p.x,p.y,2.5,0,Math.PI*2);
    ctx.fillStyle=cfg.color; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,1.2,0,Math.PI*2);
    ctx.fillStyle="#fff"; ctx.fill();
    ctx.fillStyle="rgba(200,220,255,.7)"; ctx.font="9px sans-serif"; ctx.textAlign="center";
    ctx.fillText(data[i].toFixed(2)+"%",p.x,p.y-11);
  });

  /* x labels */
  ctx.fillStyle="rgba(77,100,128,.8)"; ctx.font="9px sans-serif"; ctx.textAlign="center";
  days.forEach((d,i)=>ctx.fillText(d,PAD.l+(i/(days.length-1))*cW,H-6));
}
